<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folha de Serviço Diário - Táxi</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #111; color: #fff; }
  #app { max-width: 420px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
  input { font-family: inherit; }
  ::placeholder { color: #555; }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fadein { animation: fadein .2s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
  .inp {
    background: #2a2a2a; color: #fff; border: 1px solid #444;
    border-radius: 8px; padding: 8px 12px; width: 100%; font-size: 15px;
    font-family: inherit; outline: none;
  }
  .inp:focus { border-color: #facc15; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const COMMISSION_RATE = 0.40;
const IVA_RATE = 0.23;
const EXPENSE_CATEGORIES = ["Depósito", "Extintor", "Inspeção", "Lavagem", "Oficina", "Outros"];

let state = {
  backendUrl: "",
  configured: false,
  loading: false,
  syncing: false,
  saveSuccess: false,
  syncError: "",
  records: {},
  tab: 0,
  date: todayStr(),
  reportMonth: todayStr().slice(0, 7),
  loadedMonths: {},
  expModal: false,
  deleteModal: false,
  editExpIndex: null,
  expForm: { category: EXPENSE_CATEGORIES[0], desc: "", valor: "" },
};

let editBuffer = {};

function todayStr() { return new Date().toISOString().split("T")[0]; }
function formatEur(v) { return "€" + Number(v || 0).toFixed(2); }
function formatKm(v) { return Number(v || 0).toFixed(0) + " km"; }

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const k in (attrs || {})) {
    if (k === "style") Object.assign(e.style, attrs[k]);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  children.flat().forEach(c => { if (c != null) e.append(c.nodeType ? c : document.createTextNode(c)); });
  return e;
}

function setState(patch) { Object.assign(state, patch); render(); }
function getDay(d) {
  return state.records[d] || { kmInicial: "", kmFinal: "", valorFaturado: "", multibanco: "", portagens: "", combustivel: "", obs: "", expenses: [] };
}

function initBuffer(date) {
  const day = getDay(date);
  editBuffer = {
    kmInicial: day.kmInicial, kmFinal: day.kmFinal,
    valorFaturado: day.valorFaturado, multibanco: day.multibanco,
    portagens: day.portagens, combustivel: day.combustivel,
    obs: day.obs, expenses: JSON.parse(JSON.stringify(day.expenses || []))
  };
}

async function apiGet(action, params = {}) {
  const url = new URL(state.backendUrl);
  url.searchParams.set("action", action);
  for (const k in params) url.searchParams.set(k, params[k]);
  return (await fetch(url.toString())).json();
}
async function apiPost(body) {
  return (await fetch(state.backendUrl, {
    method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(body)
  })).json();
}

async function loadMonth(monthStr) {
  if (state.loadedMonths[monthStr]) return;
  setState({ loading: true, syncError: "" });
  try {
    const data = await apiGet("getMonth", { month: monthStr });
    if (data.error) throw new Error(data.error);
    const records = { ...state.records };
    (data.days || []).forEach(d => {
      records[d.date] = { kmInicial: d.kmInicial, kmFinal: d.kmFinal, valorFaturado: d.valorFaturado, multibanco: d.multibanco, portagens: d.portagens, combustivel: d.combustivel, obs: d.obs || "", expenses: d.expenses || [] };
    });
    setState({ records, loading: false, loadedMonths: { ...state.loadedMonths, [monthStr]: true } });
    initBuffer(state.date);
  } catch (err) {
    setState({ loading: false, syncError: "Erro ao ligar: " + err.message });
  }
}

async function saveDay() {
  const date = state.date;
  const updated = { ...state.records };
  updated[date] = { ...editBuffer, expenses: JSON.parse(JSON.stringify(editBuffer.expenses || [])) };
  state.records = updated;
  setState({ syncing: true, syncError: "" });
  try {
    await apiPost({ action: "saveDay", data: date, day: editBuffer });
    setState({ syncing: false, saveSuccess: true });
    setTimeout(() => setState({ saveSuccess: false }), 2000);
  } catch (err) {
    setState({ syncing: false, syncError: "Falha ao guardar: " + err.message });
  }
}

async function deleteDay() {
  setState({ syncing: true });
  try {
    await apiPost({ action: "deleteDay", data: state.date });
    const updated = { ...state.records };
    delete updated[state.date];
    initBuffer(state.date);
    setState({ records: updated, syncing: false, deleteModal: false });
  } catch (err) {
    setState({ syncing: false, syncError: "Falha ao apagar: " + err.message });
  }
}

function computeDay(day) {
  const kmInicial = parseFloat(day.kmInicial) || 0, kmFinal = parseFloat(day.kmFinal) || 0;
  const totalKm = kmFinal > kmInicial ? kmFinal - kmInicial : 0;
  const valorFaturado = parseFloat(day.valorFaturado) || 0;
  const multibanco = parseFloat(day.multibanco) || 0;
  const portagens = parseFloat(day.portagens) || 0;
  const combustivel = parseFloat(day.combustivel) || 0;
  const dinheiro = valorFaturado - multibanco;
  const totalOutrasDespesas = (day.expenses || []).reduce((s, e) => s + (parseFloat(e.valor) || 0), 0);
  const totalDespesas = combustivel + portagens + totalOutrasDespesas;
  const comissaoBase = valorFaturado * COMMISSION_RATE;
  const iva = comissaoBase * IVA_RATE;
  const comissaoComIva = comissaoBase + iva;
  const entregar = valorFaturado - comissaoComIva - combustivel + portagens - totalOutrasDespesas - multibanco;
  return { totalKm, valorFaturado, multibanco, portagens, combustivel, dinheiro, totalOutrasDespesas, totalDespesas, comissaoBase, iva, comissaoComIva, entregar };
}

function renderSetup() {
  const root = el("div", { style: { padding: "24px", display: "flex", flexDirection: "column", justifyContent: "center", minHeight: "100vh" } });
  let urlInput = state.backendUrl;
  root.append(
    el("div", { style: { textAlign: "center", marginBottom: 32 } },
      el("div", { style: { fontSize: 48, marginBottom: 8 } }, "🚕"),
      el("div", { style: { fontWeight: 800, fontSize: 20, color: "#facc15" } }, "Folha de Serviço"),
      el("div", { style: { fontSize: 13, color: "#888", marginTop: 4 } }, "Liga à tua Google Sheet")
    ),
    el("div", { style: { marginBottom: 20 } },
      el("span", { style: { fontSize: 12, color: "#888", display: "block", marginBottom: 6 } }, "URL do Backend (Google Apps Script)"),
      el("input", { placeholder: "https://script.google.com/macros/s/.../exec", value: urlInput, class: "inp", style: { fontSize: 13 }, oninput: e => { urlInput = e.target.value; } })
    ),
    state.syncError ? el("div", { style: { background: "#2e1a1a", border: "1px solid #f8717155", borderRadius: 10, padding: "10px 14px", fontSize: 12, color: "#f87171", marginBottom: 16 } }, state.syncError) : null,
    el("button", {
      style: { width: "100%", background: "#facc15", color: "#111", border: "none", borderRadius: 12, padding: "14px", fontWeight: 800, fontSize: 15, cursor: "pointer" },
      onclick: async () => {
        if (!urlInput.trim()) { setState({ syncError: "Preenche o URL do backend." }); return; }
        state.backendUrl = urlInput;
        setState({ configured: true });
        await loadMonth(state.date.slice(0, 7));
        initBuffer(state.date);
      }
    }, "Entrar"),
    el("div", { style: { fontSize: 11, color: "#555", marginTop: 20, textAlign: "center" } }, "Dados guardados na tua Google Sheet, organizados por mês.")
  );
  return root;
}

function renderHeader() {
  const tabs = ["Hoje", "Histórico", "Relatório", "Resumo"];
  const header = el("div", { style: { background: "#1a1a1a", padding: "16px 16px 0", borderBottom: "1px solid #333", position: "sticky", top: 0, zIndex: 10 } });
  const topRow = el("div", { style: { display: "flex", alignItems: "center", gap: 10, marginBottom: 12 } },
    el("span", { style: { fontSize: 28 } }, "🚕"),
    el("div", { style: { flex: 1 } },
      el("div", { style: { fontWeight: 700, fontSize: 17, color: "#facc15" } }, "Folha de Serviço"),
      el("div", { style: { fontSize: 11, color: "#888" } }, "Registo Diário de Táxi")
    )
  );
  if (state.syncing) { const s = el("span", {}, "🔄"); s.className = "spin"; topRow.append(s); }
  else topRow.append(el("button", { style: { background: "none", border: "none", color: "#666", fontSize: 11, cursor: "pointer" }, onclick: () => setState({ configured: false }) }, "Sair"));
  header.append(topRow);
  const nav = el("div", { style: { display: "flex" } });
  tabs.forEach((t, i) => nav.append(el("button", {
    style: { flex: 1, padding: "10px 0", fontSize: 13, fontWeight: 600, background: "none", border: "none", cursor: "pointer", color: state.tab === i ? "#facc15" : "#888", borderBottom: state.tab === i ? "2px solid #facc15" : "2px solid transparent" },
    onclick: () => setState({ tab: i })
  }, t)));
  header.append(nav);
  return header;
}

function renderHoje() {
  const date = state.date;
  const buf = editBuffer;
  const c = computeDay(buf);
  const wrap = el("div", { class: "fadein" });

  const dateRow = el("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 16 } },
    el("span", { style: { fontSize: 13, color: "#aaa" } }, "📅 Data:"),
    el("input", { type: "date", value: date, style: { background: "#222", border: "1px solid #444", color: "#fff", borderRadius: 8, padding: "4px 10px", fontSize: 13 },
      onchange: async e => { const d = e.target.value; initBuffer(d); setState({ date: d }); await loadMonth(d.slice(0, 7)); initBuffer(d); } })
  );
  if (state.records[date]) {
    dateRow.append(el("button", { style: { marginLeft: "auto", background: "#7f1d1d", border: "none", borderRadius: 8, padding: "5px 12px", color: "#fca5a5", fontSize: 12, fontWeight: 700, cursor: "pointer" }, onclick: () => setState({ deleteModal: true }) }, "🗑️ Apagar Dia"));
  }
  wrap.append(dateRow);

  function field(label, key, placeholder, type = "number") {
    return el("div", {},
      el("span", { style: { fontSize: 11, color: "#888", display: "block", marginBottom: 4 } }, label),
      el("input", { type, placeholder, value: buf[key] || "", class: "inp", onchange: e => { buf[key] = e.target.value; } })
    );
  }

  wrap.append(el("div", { style: { background: "#1e1e1e", borderRadius: 12, padding: 16, marginBottom: 12 } },
    el("div", { style: { fontWeight: 700, marginBottom: 12, color: "#facc15", fontSize: 14 } }, "📍 Quilómetros"),
    el("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 } },
      field("KM Inicial", "kmInicial", "0"), field("KM Final", "kmFinal", "0")
    ),
    el("div", { style: { background: "#facc1520", borderRadius: 8, padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" } },
      el("span", { style: { color: "#aaa", fontSize: 13 } }, "Total do Dia"),
      el("span", { style: { color: "#facc15", fontWeight: 800, fontSize: 20 } }, formatKm(c.totalKm))
    )
  ));

  wrap.append(el("div", { style: { background: "#1e1e1e", borderRadius: 12, padding: 16, marginBottom: 12 } },
    el("div", { style: { fontWeight: 700, marginBottom: 12, color: "#4ade80", fontSize: 14 } }, "💶 Faturação"),
    el("div", { style: { marginBottom: 10 } }, field("Valor Total Faturado (€)", "valorFaturado", "0.00")),
    el("div", { style: { marginBottom: 10 } }, field("Recebido em Multibanco (€)", "multibanco", "0.00")),
    el("div", { style: { background: "#1a2e1a", borderRadius: 8, padding: "10px 14px", display: "flex", justifyContent: "space-between" } },
      el("span", { style: { color: "#aaa", fontSize: 13 } }, "Recebido em Dinheiro"),
      el("span", { style: { color: "#4ade80", fontWeight: 700, fontSize: 16 } }, formatEur(c.dinheiro))
    )
  ));

  wrap.append(el("div", { style: { background: "#1e1e1e", borderRadius: 12, padding: 16, marginBottom: 12 } },
    el("div", { style: { fontWeight: 700, marginBottom: 12, color: "#fb923c", fontSize: 14 } }, "⛽ Combustível & Portagens"),
    el("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 } },
      field("Combustível (€)", "combustivel", "0.00"), field("Portagens (€)", "portagens", "0.00")
    )
  ));

  const despCard = el("div", { style: { background: "#1e1e1e", borderRadius: 12, padding: 16, marginBottom: 12 } },
    el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 } },
      el("div", { style: { fontWeight: 700, color: "#f87171", fontSize: 14 } }, "🧾 Outras Despesas"),
      el("button", { style: { background: "#f87171", color: "#fff", border: "none", borderRadius: 8, padding: "5px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer" },
        onclick: () => setState({ expModal: true, editExpIndex: null, expForm: { category: EXPENSE_CATEGORIES[0], desc: "", valor: "" } }) }, "+ Adicionar")
    )
  );
  const exps = buf.expenses || [];
  if (!exps.length) despCard.append(el("div", { style: { textAlign: "center", color: "#555", fontSize: 13, padding: "12px 0" } }, "Sem despesas extra registadas"));
  exps.forEach((e, idx) => {
    despCard.append(el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", background: "#2a2a2a", borderRadius: 8, padding: "8px 12px", marginBottom: 6 } },
      el("div", {},
        el("div", { style: { fontSize: 13, fontWeight: 600 } }, e.category),
        e.desc ? el("div", { style: { fontSize: 11, color: "#888" } }, e.desc) : null
      ),
      el("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
        el("span", { style: { color: "#f87171", fontWeight: 700 } }, formatEur(e.valor)),
        el("button", { style: { background: "none", border: "none", cursor: "pointer", fontSize: 14 }, onclick: () => setState({ expModal: true, editExpIndex: idx, expForm: { category: e.category, desc: e.desc || "", valor: e.valor } }) }, "✏️"),
        el("button", { style: { background: "none", border: "none", cursor: "pointer", fontSize: 14 }, onclick: () => { buf.expenses.splice(idx, 1); setState({}); } }, "🗑️")
      )
    ));
  });
  if (exps.length) despCard.append(el("div", { style: { background: "#2e1a1a", borderRadius: 8, padding: "8px 12px", display: "flex", justifyContent: "space-between", marginTop: 6 } },
    el("span", { style: { color: "#aaa", fontSize: 13 } }, "Total Outras Despesas"),
    el("span", { style: { color: "#f87171", fontWeight: 700 } }, formatEur(c.totalOutrasDespesas))
  ));
  wrap.append(despCard);

  wrap.append(el("div", { style: { background: "#1e1e1e", borderRadius: 12, padding: 16, marginBottom: 12 } },
    el("div", { style: { fontWeight: 700, marginBottom: 10, color: "#94a3b8", fontSize: 14 } }, "📝 Observações"),
    el("input", { placeholder: "Notas sobre o dia (opcional)", value: buf.obs || "", class: "inp", style: { fontSize: 14 }, onchange: e => { buf.obs = e.target.value; } })
  ));

  wrap.append(el("div", { style: { background: "#1e1e1e", borderRadius: 12, padding: 16, marginBottom: 12 } },
    el("div", { style: { fontWeight: 700, marginBottom: 12, color: "#c084fc", fontSize: 14 } }, "📊 Comissão"),
    el("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6 } }, el("span", { style: { color: "#aaa" } }, `Base (40% de ${formatEur(c.valorFaturado)})`), el("span", {}, formatEur(c.comissaoBase))),
    el("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6 } }, el("span", { style: { color: "#aaa" } }, "IVA (23%)"), el("span", {}, formatEur(c.iva))),
    el("div", { style: { height: 1, background: "#333", margin: "4px 0" } }),
    el("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 15, fontWeight: 700 } }, el("span", { style: { color: "#c084fc" } }, "Total Comissão c/ IVA"), el("span", { style: { color: "#c084fc" } }, formatEur(c.comissaoComIva)))
  ));

  wrap.append(el("div", { style: { background: "linear-gradient(135deg, #1a2e1a, #1e1e1e)", border: "1px solid #4ade8044", borderRadius: 12, padding: 16 } },
    el("div", { style: { fontWeight: 700, marginBottom: 12, color: "#4ade80", fontSize: 14 } }, "✅ Valor a Entregar"),
    ...[
      ["Faturado", formatEur(c.valorFaturado), "#4ade80", "+"],
      ["Comissão c/ IVA", formatEur(c.comissaoComIva), "#f87171", "−"],
      ["Combustível", formatEur(c.combustivel), "#f87171", "−"],
      ["Portagens", formatEur(c.portagens), "#4ade80", "+"],
      ["Outras Despesas", formatEur(c.totalOutrasDespesas), "#f87171", "−"],
      ["Multibanco", formatEur(c.multibanco), "#f87171", "−"],
    ].map(([l, v, col, op]) => el("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6 } },
      el("span", { style: { color: "#aaa" } }, l), el("span", { style: { color: col } }, op + " " + v))),
    el("div", { style: { background: c.entregar >= 0 ? "#4ade8022" : "#f8717122", borderRadius: 10, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 4 } },
      el("span", { style: { fontWeight: 700, fontSize: 15 } }, "Entregar"),
      el("span", { style: { fontWeight: 800, fontSize: 24, color: c.entregar >= 0 ? "#4ade80" : "#f87171" } }, formatEur(c.entregar))
    )
  ));

  return wrap;
}

function renderHistorico() {
  const wrap = el("div", { class: "fadein" });
  wrap.append(el("div", { style: { fontWeight: 700, fontSize: 16, marginBottom: 16, color: "#facc15" } }, "📋 Histórico de Dias"));
  const dates = Object.keys(state.records).sort((a, b) => b.localeCompare(a));
  if (!dates.length) { wrap.append(el("div", { style: { textAlign: "center", color: "#555", padding: 40 } }, "Nenhum registo carregado.")); return wrap; }
  dates.forEach(d => {
    const c = computeDay(getDay(d));
    const isToday = d === todayStr();
    wrap.append(el("div", { style: { background: "#1e1e1e", borderRadius: 12, padding: 14, marginBottom: 10, cursor: "pointer", border: isToday ? "1px solid #facc1566" : "1px solid transparent" },
      onclick: () => { initBuffer(d); setState({ date: d, tab: 0 }); } },
      el("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: 8 } },
        el("div", { style: { fontWeight: 700, fontSize: 14 } }, (isToday ? "🟡 Hoje" : "📅") + " " + d),
        el("div", { style: { fontWeight: 800, fontSize: 16, color: c.entregar >= 0 ? "#4ade80" : "#f87171" } }, formatEur(c.entregar))
      ),
      el("div", { style: { display: "flex", gap: 12, fontSize: 12, color: "#aaa", flexWrap: "wrap" } },
        el("span", {}, "🛣️ " + formatKm(c.totalKm)), el("span", {}, "💶 " + formatEur(c.valorFaturado)),
        el("span", {}, "📊 " + formatEur(c.comissaoComIva)), el("span", {}, "🧾 " + formatEur(c.totalDespesas))
      )
    ));
  });
  return wrap;
}

function renderRelatorio() {
  const wrap = el("div", { class: "fadein" });
  wrap.append(el("div", { style: { fontWeight: 700, fontSize: 16, marginBottom: 16, color: "#facc15" } }, "📈 Relatório Mensal"));
  wrap.append(el("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 16 } },
    el("span", { style: { fontSize: 13, color: "#aaa" } }, "Mês:"),
    el("input", { type: "month", value: state.reportMonth, style: { background: "#222", border: "1px solid #444", color: "#fff", borderRadius: 8, padding: "4px 10px", fontSize: 13 },
      onchange: async e => { const m = e.target.value; setState({ reportMonth: m }); await loadMonth(m); } }),
    el("button", { style: { marginLeft: "auto", background: "#333", border: "none", borderRadius: 8, padding: "6px 12px", color: "#aaa", fontSize: 11, cursor: "pointer" },
      onclick: async () => { state.loadedMonths[state.reportMonth] = false; await loadMonth(state.reportMonth); } }, "🔄")
  ));
  const mDates = Object.keys(state.records).filter(d => d.startsWith(state.reportMonth));
  if (!mDates.length) { wrap.append(el("div", { style: { textAlign: "center", color: "#555", padding: 40 } }, "Sem registos. Clica em 🔄 para carregar.")); return wrap; }
  const stats = mDates.reduce((acc, d) => {
    const c = computeDay(getDay(d));
    return { km: acc.km + c.totalKm, faturado: acc.faturado + c.valorFaturado, multibanco: acc.multibanco + c.multibanco, dinheiro: acc.dinheiro + c.dinheiro, despesas: acc.despesas + c.totalDespesas, comissao: acc.comissao + c.comissaoComIva, entregar: acc.entregar + c.entregar, dias: acc.dias + 1 };
  }, { km: 0, faturado: 0, multibanco: 0, dinheiro: 0, despesas: 0, comissao: 0, entregar: 0, dias: 0 });
  const grid = el("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 } });
  [["Dias Trabalhados", stats.dias + " dias", "#facc15"], ["KM Totais", formatKm(stats.km), "#facc15"],
   ["Total Faturado", formatEur(stats.faturado), "#4ade80"], ["Multibanco", formatEur(stats.multibanco), "#60a5fa"],
   ["Dinheiro", formatEur(stats.dinheiro), "#60a5fa"], ["Total Despesas", formatEur(stats.despesas), "#f87171"],
   ["Total Comissões", formatEur(stats.comissao), "#c084fc"]].forEach(([l, v, c]) => {
    grid.append(el("div", { style: { background: "#1e1e1e", borderRadius: 10, padding: "12px 14px" } },
      el("div", { style: { fontSize: 11, color: "#666", marginBottom: 4 } }, l),
      el("div", { style: { fontWeight: 700, fontSize: 16, color: c } }, v)
    ));
  });
  wrap.append(grid);
  wrap.append(el("div", { style: { background: "linear-gradient(135deg,#1a2e1a,#1e1e1e)", border: "1px solid #4ade8044", borderRadius: 12, padding: 16 } },
    el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
      el("div", {}, el("div", { style: { fontSize: 12, color: "#aaa", marginBottom: 4 } }, "💰 Entregar do Mês"), el("div", { style: { fontSize: 11, color: "#555" } }, "Média: " + formatEur(stats.entregar / stats.dias) + " / dia")),
      el("div", { style: { fontWeight: 800, fontSize: 28, color: stats.entregar >= 0 ? "#4ade80" : "#f87171" } }, formatEur(stats.entregar))
    )
  ));
  return wrap;
}

function renderResumo() {
  const wrap = el("div", { class: "fadein" });
  wrap.append(el("div", { style: { fontWeight: 700, fontSize: 16, marginBottom: 4, color: "#facc15" } }, "📊 Resumo Mensal"));
  wrap.append(el("div", { style: { fontSize: 12, color: "#666", marginBottom: 16 } }, "Indicadores de performance"));
  wrap.append(el("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 20 } },
    el("span", { style: { fontSize: 13, color: "#aaa" } }, "Mês:"),
    el("input", { type: "month", value: state.reportMonth, style: { background: "#222", border: "1px solid #444", color: "#fff", borderRadius: 8, padding: "4px 10px", fontSize: 13 },
      onchange: async e => { const m = e.target.value; setState({ reportMonth: m }); await loadMonth(m); } })
  ));
  const mDates = Object.keys(state.records).filter(d => d.startsWith(state.reportMonth));
  if (!mDates.length) { wrap.append(el("div", { style: { textAlign: "center", color: "#555", padding: 40 } }, "Sem registos para este mês.")); return wrap; }
  const dayStats = mDates.map(d => computeDay(getDay(d)));
  const totKm = dayStats.reduce((s, d) => s + d.totalKm, 0);
  const totVf = dayStats.reduce((s, d) => s + d.valorFaturado, 0);
  const totMb = dayStats.reduce((s, d) => s + d.multibanco, 0);
  const totComb = dayStats.reduce((s, d) => s + d.combustivel, 0);
  const totPort = dayStats.reduce((s, d) => s + d.portagens, 0);
  const totIva = dayStats.reduce((s, d) => s + d.iva, 0);
  const totComBase = dayStats.reduce((s, d) => s + d.comissaoBase, 0);
  const totComTotal = dayStats.reduce((s, d) => s + d.comissaoComIva, 0);
  const dias = dayStats.length;
  const catTotals = {};
  let totDeposito = 0;
  mDates.forEach(d => {
    (getDay(d).expenses || []).forEach(e => {
      const cat = e.category || "Outros";
      if (cat === "Depósito") totDeposito += (parseFloat(e.valor) || 0);
      else catTotals[cat] = (catTotals[cat] || 0) + (parseFloat(e.valor) || 0);
    });
  });
  const totOutrasRes = Object.values(catTotals).reduce((s, v) => s + v, 0);
  const totEntregarReal = totVf - totComTotal - totComb + totPort - totOutrasRes - totDeposito - totMb;

  function kpi(icon, title, value, sub, color) {
    return el("div", { style: { background: "#1e1e1e", borderRadius: 12, padding: 16, marginBottom: 10, border: `1px solid ${color}33` } },
      el("div", { style: { fontSize: 11, color: "#777", marginBottom: 6 } }, icon + " " + title),
      el("div", { style: { fontWeight: 800, fontSize: 22, color } }, value),
      sub ? el("div", { style: { fontSize: 11, color: "#666", marginTop: 4 } }, sub) : null
    );
  }

  wrap.append(el("div", { style: { fontSize: 11, color: "#facc15", fontWeight: 700, letterSpacing: 1, marginBottom: 8, textTransform: "uppercase" } }, "📍 Quilómetros"));
  wrap.append(kpi("🛣️", "Média de KM por Dia", (totKm / dias).toFixed(1) + " km", `Total: ${totKm.toFixed(0)} km em ${dias} dias`, "#facc15"));
  wrap.append(kpi("💶", "Faturado por KM — Dia", "€" + (dayStats.reduce((s, d) => s + (d.totalKm > 0 ? d.valorFaturado / d.totalKm : 0), 0) / dias).toFixed(3) + "/km", "Média KM diário", "#60a5fa"));
  wrap.append(kpi("📈", "Faturado por KM — Acumulado", "€" + (totKm > 0 ? totVf / totKm : 0).toFixed(3) + "/km", "Média KM Mensal", "#60a5fa"));
  wrap.append(el("div", { style: { fontSize: 11, color: "#f87171", fontWeight: 700, letterSpacing: 1, margin: "16px 0 8px", textTransform: "uppercase" } }, "⛽ Combustível"));
  wrap.append(kpi("⛽", "Custo de Combustível por 100 km", formatEur(totKm > 0 ? (totComb / totKm) * 100 : 0) + "/100km", `${formatEur(totComb)} gastos · ${totKm.toFixed(0)} km`, "#f87171"));
  wrap.append(el("div", { style: { fontSize: 11, color: "#c084fc", fontWeight: 700, letterSpacing: 1, margin: "16px 0 8px", textTransform: "uppercase" } }, "📊 Comissão"));
  wrap.append(kpi("🧾", "Total IVA da Comissão", formatEur(totIva), `Base: ${formatEur(totComBase)} · IVA: ${formatEur(totIva)}`, "#c084fc"));
  wrap.append(el("div", { style: { fontSize: 11, color: "#4ade80", fontWeight: 700, letterSpacing: 1, margin: "16px 0 8px", textTransform: "uppercase" } }, "💰 Valor a Entregar"));

  const devCard = el("div", { style: { background: totEntregarReal >= 0 ? "#1a2e1a" : "#2e1a1a", border: `1px solid ${totEntregarReal >= 0 ? "#4ade80" : "#f87171"}55`, borderRadius: 14, padding: 18, marginBottom: 10 } });
  const lines = el("div", { style: { display: "flex", flexDirection: "column", gap: 6, marginBottom: 14 } });
  lines.append(el("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13 } }, el("span", { style: { color: "#888" } }, "💶 Total Faturado"), el("span", { style: { color: "#4ade80", fontWeight: 600 } }, "+ " + formatEur(totVf))));
  lines.append(el("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13 } }, el("span", { style: { color: "#888" } }, "📊 Comissão c/ IVA"), el("span", { style: { color: "#c084fc", fontWeight: 600 } }, "− " + formatEur(totComTotal))));
  lines.append(el("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13 } }, el("span", { style: { color: "#888" } }, "⛽ Combustível"), el("span", { style: { color: "#f87171", fontWeight: 600 } }, "− " + formatEur(totComb))));
  lines.append(el("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13 } }, el("span", { style: { color: "#888" } }, "💳 Multibanco"), el("span", { style: { color: "#60a5fa", fontWeight: 600 } }, "− " + formatEur(totMb))));
  if (totDeposito > 0) lines.append(el("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13 } }, el("span", { style: { color: "#888" } }, "🏦 Depósito Bancário"), el("span", { style: { color: "#60a5fa", fontWeight: 600 } }, "− " + formatEur(totDeposito))));
  const catEntries = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
  if (catEntries.length > 0) {
    lines.append(el("div", { style: { fontSize: 11, color: "#666", margin: "6px 0 2px", fontWeight: 600, textTransform: "uppercase" } }, "🧾 Outras Despesas"));
    catEntries.forEach(([cat, val]) => lines.append(el("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13, paddingLeft: 12 } }, el("span", { style: { color: "#888" } }, "· " + cat), el("span", { style: { color: "#f87171", fontWeight: 600 } }, "− " + formatEur(val)))));
    if (catEntries.length > 1) lines.append(el("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, paddingLeft: 12, marginTop: 2 } }, el("span", { style: { color: "#666" } }, "Total outras despesas"), el("span", { style: { color: "#f87171" } }, "− " + formatEur(totOutrasRes))));
  }
  if (totPort > 0) lines.append(el("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13, marginTop: 4 } }, el("span", { style: { color: "#888" } }, "🛣️ Portagens (cliente)"), el("span", { style: { color: "#4ade80", fontWeight: 600 } }, "+ " + formatEur(totPort))));
  devCard.append(lines);
  devCard.append(el("div", { style: { height: 1, background: "#333", marginBottom: 14 } }));
  devCard.append(el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
    el("span", { style: { fontWeight: 700, fontSize: 14 } }, "Total a Entregar"),
    el("span", { style: { fontWeight: 800, fontSize: 28, color: totEntregarReal >= 0 ? "#4ade80" : "#f87171" } }, formatEur(totEntregarReal))
  ));
  wrap.append(devCard);
  return wrap;
}

function renderBottomNav() {
  const nav = el("div", { style: { position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 420, background: "#1a1a1a", borderTop: "1px solid #333", padding: "10px 16px" } });
  if (state.tab === 0) {
    nav.append(el("button", {
      style: { width: "100%", padding: "13px", background: state.saveSuccess ? "#16a34a" : "#facc15", border: "none", borderRadius: 12, color: "#111", fontWeight: 800, fontSize: 15, cursor: "pointer", transition: "background 0.3s" },
      onclick: saveDay
    }, state.saveSuccess ? "✅ Guardado!" : "💾 Gravar Dia"));
  } else {
    nav.append(el("div", { style: { height: 44 } }));
  }
  return nav;
}

function renderDeleteModal() {
  if (!state.deleteModal) return null;
  return el("div", { style: { position: "fixed", inset: 0, background: "#000b", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 24 }, onclick: e => { if (e.target === e.currentTarget) setState({ deleteModal: false }); } },
    el("div", { style: { background: "#1e1e1e", borderRadius: 16, padding: 24, width: "100%", maxWidth: 360 } },
      el("div", { style: { fontSize: 36, textAlign: "center", marginBottom: 12 } }, "🗑️"),
      el("div", { style: { fontWeight: 700, fontSize: 17, textAlign: "center", marginBottom: 8 } }, "Apagar Registo"),
      el("div", { style: { fontSize: 13, color: "#aaa", textAlign: "center", marginBottom: 24 } }, `Apagar o registo de ${state.date}? Esta ação não pode ser desfeita.`),
      el("div", { style: { display: "flex", gap: 10 } },
        el("button", { style: { flex: 1, padding: 12, background: "#333", border: "none", borderRadius: 10, color: "#aaa", fontWeight: 700, cursor: "pointer" }, onclick: () => setState({ deleteModal: false }) }, "Cancelar"),
        el("button", { style: { flex: 1, padding: 12, background: "#dc2626", border: "none", borderRadius: 10, color: "#fff", fontWeight: 700, cursor: "pointer" }, onclick: deleteDay }, "Apagar")
      )
    )
  );
}

function renderExpModal() {
  if (!state.expModal) return null;
  return el("div", { style: { position: "fixed", inset: 0, background: "#000a", display: "flex", alignItems: "flex-end", zIndex: 100 }, onclick: e => { if (e.target === e.currentTarget) setState({ expModal: false }); } },
    el("div", { style: { background: "#1e1e1e", borderRadius: "20px 20px 0 0", padding: 24, width: "100%", maxWidth: 420, margin: "0 auto" } },
      el("div", { style: { fontWeight: 700, fontSize: 16, marginBottom: 16, color: "#f87171" } }, state.editExpIndex !== null ? "✏️ Editar Despesa" : "➕ Nova Despesa"),
      el("div", { style: { marginBottom: 12 } },
        el("span", { style: { fontSize: 11, color: "#888", display: "block", marginBottom: 6 } }, "Tipo"),
        el("div", { style: { display: "flex", flexWrap: "wrap", gap: 6 } }, EXPENSE_CATEGORIES.map(c =>
          el("button", { style: { padding: "6px 12px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 600, background: state.expForm.category === c ? "#f87171" : "#2a2a2a", color: state.expForm.category === c ? "#fff" : "#aaa" },
            onclick: () => { state.expForm.category = c; render(); } }, c)
        ))
      ),
      el("div", { style: { marginBottom: 12 } },
        el("span", { style: { fontSize: 11, color: "#888", display: "block", marginBottom: 6 } }, "Descrição (opcional)"),
        el("input", { value: state.expForm.desc, placeholder: "Ex: Oficina XPTO", class: "inp", style: { fontSize: 14 }, oninput: e => { state.expForm.desc = e.target.value; } })
      ),
      el("div", { style: { marginBottom: 20 } },
        el("span", { style: { fontSize: 11, color: "#888", display: "block", marginBottom: 6 } }, "Valor (€)"),
        el("input", { type: "number", value: state.expForm.valor, placeholder: "0.00", class: "inp", style: { fontSize: 20, fontWeight: 700 }, oninput: e => { state.expForm.valor = e.target.value; } })
      ),
      el("div", { style: { display: "flex", gap: 10 } },
        el("button", { style: { flex: 1, padding: 12, background: "#333", border: "none", borderRadius: 10, color: "#aaa", fontWeight: 700, cursor: "pointer" }, onclick: () => setState({ expModal: false }) }, "Cancelar"),
        el("button", { style: { flex: 2, padding: 12, background: "#f87171", border: "none", borderRadius: 10, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 15 },
          onclick: () => {
            if (!state.expForm.valor) return;
            if (state.editExpIndex !== null) editBuffer.expenses[state.editExpIndex] = { ...state.expForm };
            else editBuffer.expenses.push({ ...state.expForm });
            setState({ expModal: false, expForm: { category: EXPENSE_CATEGORIES[0], desc: "", valor: "" }, editExpIndex: null });
          }
        }, state.editExpIndex !== null ? "Guardar" : "Adicionar")
      )
    )
  );
}

function render() {
  const root = document.getElementById("app");
  root.innerHTML = "";
  if (!state.configured) { root.append(renderSetup()); return; }
  root.append(renderHeader());
  if (state.syncError) root.append(el("div", { style: { margin: "10px 16px 0", background: "#2e1a1a", border: "1px solid #f8717155", borderRadius: 10, padding: "8px 12px", fontSize: 11, color: "#f87171" } }, "⚠️ " + state.syncError));
  if (state.loading) {
    root.append(el("div", { style: { textAlign: "center", padding: 60, color: "#888" } }, "A carregar dados..."));
  } else {
    const content = el("div", { style: { padding: 16 } });
    if (state.tab === 0) content.append(renderHoje());
    else if (state.tab === 1) content.append(renderHistorico());
    else if (state.tab === 2) content.append(renderRelatorio());
    else content.append(renderResumo());
    root.append(content);
  }
  root.append(renderBottomNav());
  const dm = renderDeleteModal(); if (dm) root.append(dm);
  const em = renderExpModal(); if (em) root.append(em);
}

render();
</script>
</body>
</html>
