<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folha de Serviço Diário - Táxi</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #111; color: #fff; }
  #app { max-width: 420px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
  input, button { font-family: inherit; }
  ::placeholder { color: #555; }
  .inp { background:#2a2a2a; color:#fff; border:1px solid #444; border-radius:8px; padding:8px 12px; width:100%; font-size:15px; outline:none; }
  .inp:focus { border-color:#facc15; }
  .card { background:#1e1e1e; border-radius:12px; padding:16px; margin-bottom:12px; }
  .lbl { font-size:11px; color:#888; display:block; margin-bottom:4px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .row { display:flex; justify-content:space-between; align-items:center; font-size:13px; margin-bottom:6px; }
  .spin { animation:spin 1s linear infinite; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="app"></div>
<div id="modals"></div>
<script>
const CR = 0.40, IVA = 0.23;
const CATS = ["Depósito","Extintor","Inspeção","Lavagem","Oficina","Outros"];

// Estado global — nunca inclui dados dos inputs (esses ficam no DOM)
let S = {
  url:"", ok:false, loading:false, syncing:false, saved:false, err:"",
  records:{}, tab:0, date:today(), month:today().slice(0,7),
  loadedMonths:{}, expModal:false, deleteModal:false,
  editExpIdx:null, expForm:{cat:CATS[0],desc:"",val:""}
};

// Buffer de edição — só é lido quando se grava
let B = newBuf();

function today(){ return new Date().toISOString().split("T")[0]; }
function eur(v){ return "€"+Number(v||0).toFixed(2); }
function km(v){ return Number(v||0).toFixed(0)+" km"; }
function newBuf(d){
  d = d||{};
  return {kmI:d.kmInicial||"", kmF:d.kmFinal||"", fat:d.valorFaturado||"",
    mb:d.multibanco||"", port:d.portagens||"", comb:d.combustivel||"",
    obs:d.obs||"", exps:JSON.parse(JSON.stringify(d.expenses||[]))};
}
function getDay(d){ return S.records[d]||{}; }
function calc(b){
  const kmI=parseFloat(b.kmI)||0, kmF=parseFloat(b.kmF)||0;
  const tkm = kmF>kmI?kmF-kmI:0;
  const fat=parseFloat(b.fat)||0, mb=parseFloat(b.mb)||0;
  const port=parseFloat(b.port)||0, comb=parseFloat(b.comb)||0;
  const outras=(b.exps||[]).reduce((s,e)=>s+(parseFloat(e.valor)||0),0);
  const comB=fat*CR, ivaV=comB*IVA, com=comB+ivaV;
  const entr=fat-com-comb+port-outras-mb;
  return {tkm,fat,mb,port,comb,outras,comB,ivaV,com,entr,din:fat-mb};
}

// Lê os inputs do DOM para o buffer (chamado antes de gravar)
function syncBufferFromDOM(){
  const g = id => { const e=document.getElementById(id); return e?e.value:""; };
  B.kmI=g("f_kmI"); B.kmF=g("f_kmF"); B.fat=g("f_fat");
  B.mb=g("f_mb"); B.port=g("f_port"); B.comb=g("f_comb"); B.obs=g("f_obs");
}

// API
async function apiGet(action,params={}){
  const u=new URL(S.url); u.searchParams.set("action",action);
  for(const k in params) u.searchParams.set(k,params[k]);
  return (await fetch(u.toString())).json();
}
async function apiPost(body){
  return (await fetch(S.url,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(body)})).json();
}

async function loadMonth(m){
  if(S.loadedMonths[m]) return;
  S.loading=true; S.err=""; render();
  try{
    const d=await apiGet("getMonth",{month:m});
    if(d.error) throw new Error(d.error);
    (d.days||[]).forEach(r=>{ S.records[r.date]={kmInicial:r.kmInicial,kmFinal:r.kmFinal,valorFaturado:r.valorFaturado,multibanco:r.multibanco,portagens:r.portagens,combustivel:r.combustivel,obs:r.obs||"",expenses:r.expenses||[]}; });
    S.loadedMonths[m]=true;
  }catch(e){ S.err="Erro: "+e.message; }
  S.loading=false; render();
}

async function saveDay(){
  syncBufferFromDOM();
  const date=S.date;
  S.records[date]={kmInicial:B.kmI,kmFinal:B.kmF,valorFaturado:B.fat,multibanco:B.mb,portagens:B.port,combustivel:B.comb,obs:B.obs,expenses:JSON.parse(JSON.stringify(B.exps))};
  S.syncing=true; S.err=""; renderStatus();
  try{
    await apiPost({action:"saveDay",data:date,day:{kmInicial:B.kmI,kmFinal:B.kmF,valorFaturado:B.fat,multibanco:B.mb,portagens:B.port,combustivel:B.comb,obs:B.obs,expenses:B.exps}});
    S.saved=true; S.syncing=false; renderStatus();
    setTimeout(()=>{ S.saved=false; renderStatus(); },2000);
  }catch(e){ S.err="Falha: "+e.message; S.syncing=false; renderStatus(); }
}

async function deleteDay(){
  S.syncing=true; renderStatus();
  try{
    await apiPost({action:"deleteDay",data:S.date});
    delete S.records[S.date];
    B=newBuf();
  }catch(e){ S.err="Falha: "+e.message; }
  S.syncing=false; S.deleteModal=false; render();
}

// Renderiza só o botão/status sem tocar nos inputs
function renderStatus(){
  const btn=document.getElementById("btn_save");
  const spin=document.getElementById("hdr_spin");
  const errEl=document.getElementById("err_bar");
  if(btn){
    btn.textContent=S.saved?"✅ Guardado!":"💾 Gravar Dia";
    btn.style.background=S.saved?"#16a34a":"#facc15";
  }
  if(spin) spin.style.display=S.syncing?"inline-block":"none";
  if(errEl){ errEl.textContent=S.err?"⚠️ "+S.err:""; errEl.style.display=S.err?"block":"none"; }
  // Atualiza cálculos em tempo real sem re-render
  updateCalc();
}

// Atualiza apenas os valores calculados no DOM
function updateCalc(){
  const g=id=>{ const e=document.getElementById(id); return e?e.value:""; };
  const b={kmI:g("f_kmI"),kmF:g("f_kmF"),fat:g("f_fat"),mb:g("f_mb"),port:g("f_port"),comb:g("f_comb"),exps:B.exps};
  const c=calc(b);
  const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent=v; };
  set("c_tkm",km(c.tkm)); set("c_din",eur(c.din));
  set("c_comB","Base (40% de "+eur(c.fat)+"): "+eur(c.comB));
  set("c_iva","IVA (23%): "+eur(c.ivaV));
  set("c_com",eur(c.com));
  set("c_fat_r","+ "+eur(c.fat)); set("c_com_r","− "+eur(c.com));
  set("c_comb_r","− "+eur(c.comb)); set("c_port_r","+ "+eur(c.port));
  set("c_outras_r","− "+eur(c.outras)); set("c_mb_r","− "+eur(c.mb));
  set("c_entr",eur(c.entr));
  const el=document.getElementById("c_entr");
  if(el) el.style.color=c.entr>=0?"#4ade80":"#f87171";
}

function h(tag,attrs,...kids){
  const e=document.createElement(tag);
  for(const k in (attrs||{})){
    if(k==="style") Object.assign(e.style,attrs[k]);
    else if(k==="class") e.className=attrs[k];
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  }
  kids.flat().forEach(c=>{ if(c!=null) e.append(c instanceof Node?c:document.createTextNode(String(c))); });
  return e;
}

// ── RENDER PRINCIPAL ──
function render(){
  const root=document.getElementById("app");
  const mods=document.getElementById("modals");
  root.innerHTML=""; mods.innerHTML="";

  if(!S.ok){ root.append(renderSetup()); return; }

  root.append(renderHeader());

  const errBar=h("div",{id:"err_bar",style:{margin:"10px 16px 0",background:"#2e1a1a",border:"1px solid #f8717155",borderRadius:"10px",padding:"8px 12px",fontSize:"11px",color:"#f87171",display:S.err?"block":"none"}},"⚠️ "+S.err);
  root.append(errBar);

  if(S.loading){ root.append(h("div",{style:{textAlign:"center",padding:"60px",color:"#888"}},"A carregar...")); }
  else{
    const content=h("div",{style:{padding:"16px"}});
    if(S.tab===0) content.append(renderHoje());
    else if(S.tab===1) content.append(renderHistorico());
    else if(S.tab===2) content.append(renderRelatorio());
    else content.append(renderResumo());
    root.append(content);
  }

  root.append(renderNav());

  if(S.deleteModal) mods.append(renderDeleteModal());
  if(S.expModal) mods.append(renderExpModal());
}

function renderSetup(){
  let urlVal=S.url;
  return h("div",{style:{padding:"24px",display:"flex",flexDirection:"column",justifyContent:"center",minHeight:"100vh"}},
    h("div",{style:{textAlign:"center",marginBottom:"32px"}},
      h("div",{style:{fontSize:"48px",marginBottom:"8px"}},"🚕"),
      h("div",{style:{fontWeight:"800",fontSize:"20px",color:"#facc15"}},"Folha de Serviço"),
      h("div",{style:{fontSize:"13px",color:"#888",marginTop:"4px"}},"Liga à tua Google Sheet")
    ),
    h("div",{style:{marginBottom:"20px"}},
      h("span",{style:{fontSize:"12px",color:"#888",display:"block",marginBottom:"6px"}},"URL do Backend (Google Apps Script)"),
      h("input",{class:"inp",placeholder:"https://script.google.com/macros/s/.../exec",value:urlVal,style:{fontSize:"13px"},oninput:e=>{urlVal=e.target.value;}})
    ),
    S.err?h("div",{style:{background:"#2e1a1a",border:"1px solid #f8717155",borderRadius:"10px",padding:"10px 14px",fontSize:"12px",color:"#f87171",marginBottom:"16px"}},S.err):null,
    h("button",{style:{width:"100%",background:"#facc15",color:"#111",border:"none",borderRadius:"12px",padding:"14px",fontWeight:"800",fontSize:"15px",cursor:"pointer"},
      onclick:async()=>{
        if(!urlVal.trim()){S.err="Preenche o URL.";render();return;}
        S.url=urlVal; S.ok=true;
        await loadMonth(S.date.slice(0,7));
        B=newBuf(getDay(S.date));
        render();
      }},"Entrar"),
    h("div",{style:{fontSize:"11px",color:"#555",marginTop:"20px",textAlign:"center"}},"Dados guardados na tua Google Sheet.")
  );
}

function renderHeader(){
  const tabs=["Hoje","Histórico","Relatório","Resumo"];
  const hdr=h("div",{style:{background:"#1a1a1a",padding:"16px 16px 0",borderBottom:"1px solid #333",position:"sticky",top:"0",zIndex:"10"}});
  const top=h("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}},
    h("span",{style:{fontSize:"28px"}},"🚕"),
    h("div",{style:{flex:"1"}},
      h("div",{style:{fontWeight:"700",fontSize:"17px",color:"#facc15"}},"Folha de Serviço"),
      h("div",{style:{fontSize:"11px",color:"#888"}},"Registo Diário de Táxi")
    ),
    h("span",{id:"hdr_spin",class:"spin",style:{fontSize:"16px",display:S.syncing?"inline-block":"none"}},"🔄"),
    h("button",{style:{background:"none",border:"none",color:"#666",fontSize:"11px",cursor:"pointer"},onclick:()=>{S.ok=false;render();}},"Sair")
  );
  hdr.append(top);
  const nav=h("div",{style:{display:"flex"}});
  tabs.forEach((t,i)=>nav.append(h("button",{
    style:{flex:"1",padding:"10px 0",fontSize:"13px",fontWeight:"600",background:"none",border:"none",cursor:"pointer",
      color:S.tab===i?"#facc15":"#888",borderBottom:S.tab===i?"2px solid #facc15":"2px solid transparent"},
    onclick:()=>{if(S.tab!==i){syncBufferFromDOM();S.tab=i;render();}}
  },t)));
  hdr.append(nav);
  return hdr;
}

function renderHoje(){
  const d=S.date, day=getDay(d), b=B;
  const c=calc(b);
  const wrap=h("div",{});

  // Data
  const dateRow=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"16px"}},
    h("span",{style:{fontSize:"13px",color:"#aaa"}},"📅 Data:"),
    h("input",{type:"date",value:d,style:{background:"#222",border:"1px solid #444",color:"#fff",borderRadius:"8px",padding:"4px 10px",fontSize:"13px"},
      onchange:async e=>{
        syncBufferFromDOM();
        S.date=e.target.value;
        await loadMonth(S.date.slice(0,7));
        B=newBuf(getDay(S.date));
        render();
      }}),
    h("button",{style:{marginLeft:"auto",background:"#333",border:"none",borderRadius:"8px",padding:"5px 10px",color:"#aaa",fontSize:"13px",cursor:"pointer"},
      onclick:async()=>{
        S.loadedMonths[S.date.slice(0,7)]=false;
        await loadMonth(S.date.slice(0,7));
        B=newBuf(getDay(S.date));
        render();
      }},"🔄")
  );
  if(S.records[d]) dateRow.append(h("button",{style:{background:"#7f1d1d",border:"none",borderRadius:"8px",padding:"5px 12px",color:"#fca5a5",fontSize:"12px",fontWeight:"700",cursor:"pointer"},onclick:()=>{S.deleteModal=true;render();}},"🗑️"));
  wrap.append(dateRow);

  // KM
  const kmCard=h("div",{class:"card"},
    h("div",{style:{fontWeight:"700",marginBottom:"12px",color:"#facc15",fontSize:"14px"}},"📍 Quilómetros"),
    h("div",{class:"grid2",style:{marginBottom:"10px"}},
      mkField("KM Inicial","f_kmI",b.kmI,"0"),
      mkField("KM Final","f_kmF",b.kmF,"0")
    ),
    h("div",{style:{background:"#facc1520",borderRadius:"8px",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
      h("span",{style:{color:"#aaa",fontSize:"13px"}},"Total do Dia"),
      h("span",{id:"c_tkm",style:{color:"#facc15",fontWeight:"800",fontSize:"20px"}},km(c.tkm))
    )
  );
  wrap.append(kmCard);

  // Faturação
  wrap.append(h("div",{class:"card"},
    h("div",{style:{fontWeight:"700",marginBottom:"12px",color:"#4ade80",fontSize:"14px"}},"💶 Faturação"),
    h("div",{style:{marginBottom:"10px"}},mkField("Valor Total Faturado (€)","f_fat",b.fat,"0.00")),
    h("div",{style:{marginBottom:"10px"}},mkField("Recebido em Multibanco (€)","f_mb",b.mb,"0.00")),
    h("div",{style:{background:"#1a2e1a",borderRadius:"8px",padding:"10px 14px",display:"flex",justifyContent:"space-between"}},
      h("span",{style:{color:"#aaa",fontSize:"13px"}},"Recebido em Dinheiro"),
      h("span",{id:"c_din",style:{color:"#4ade80",fontWeight:"700",fontSize:"16px"}},eur(c.din))
    )
  ));

  // Combustível & Portagens
  wrap.append(h("div",{class:"card"},
    h("div",{style:{fontWeight:"700",marginBottom:"12px",color:"#fb923c",fontSize:"14px"}},"⛽ Combustível & Portagens"),
    h("div",{class:"grid2"},
      mkField("Combustível (€)","f_comb",b.comb,"0.00"),
      mkField("Portagens (€)","f_port",b.port,"0.00")
    )
  ));

  // Outras Despesas
  const despCard=h("div",{class:"card"},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},
      h("div",{style:{fontWeight:"700",color:"#f87171",fontSize:"14px"}},"🧾 Outras Despesas"),
      h("button",{style:{background:"#f87171",color:"#fff",border:"none",borderRadius:"8px",padding:"5px 12px",fontSize:"12px",fontWeight:"700",cursor:"pointer"},
        onclick:()=>{S.expModal=true;S.editExpIdx=null;S.expForm={cat:CATS[0],desc:"",val:""};render();}},"+Adicionar")
    )
  );
  if(!b.exps.length) despCard.append(h("div",{style:{textAlign:"center",color:"#555",fontSize:"13px",padding:"12px 0"}},"Sem despesas extra"));
  b.exps.forEach((e,i)=>{
    despCard.append(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#2a2a2a",borderRadius:"8px",padding:"8px 12px",marginBottom:"6px"}},
      h("div",{},h("div",{style:{fontSize:"13px",fontWeight:"600"}},e.category),e.desc?h("div",{style:{fontSize:"11px",color:"#888"}},e.desc):null),
      h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
        h("span",{style:{color:"#f87171",fontWeight:"700"}},eur(e.valor)),
        h("button",{style:{background:"none",border:"none",cursor:"pointer",fontSize:"14px"},onclick:()=>{S.expModal=true;S.editExpIdx=i;S.expForm={cat:e.category,desc:e.desc||"",val:e.valor};render();}},"✏️"),
        h("button",{style:{background:"none",border:"none",cursor:"pointer",fontSize:"14px"},onclick:()=>{B.exps.splice(i,1);render();}},"🗑️")
      )
    ));
  });
  wrap.append(despCard);

  // Observações
  wrap.append(h("div",{class:"card"},
    h("div",{style:{fontWeight:"700",marginBottom:"10px",color:"#94a3b8",fontSize:"14px"}},"📝 Observações"),
    h("input",{id:"f_obs",class:"inp",placeholder:"Notas sobre o dia (opcional)",value:b.obs||"",style:{fontSize:"14px"}})
  ));

  // Comissão
  wrap.append(h("div",{class:"card"},
    h("div",{style:{fontWeight:"700",marginBottom:"12px",color:"#c084fc",fontSize:"14px"}},"📊 Comissão"),
    h("div",{id:"c_comB",style:{fontSize:"13px",color:"#aaa",marginBottom:"6px"}},"Base (40% de "+eur(c.fat)+"): "+eur(c.comB)),
    h("div",{id:"c_iva",style:{fontSize:"13px",color:"#aaa",marginBottom:"6px"}},"IVA (23%): "+eur(c.ivaV)),
    h("div",{style:{height:"1px",background:"#333",margin:"4px 0"}}),
    h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"15px",fontWeight:"700"}},
      h("span",{style:{color:"#c084fc"}},"Total Comissão c/ IVA"),
      h("span",{id:"c_com",style:{color:"#c084fc"}},eur(c.com))
    )
  ));

  // Entregar
  wrap.append(h("div",{style:{background:"linear-gradient(135deg,#1a2e1a,#1e1e1e)",border:"1px solid #4ade8044",borderRadius:"12px",padding:"16px"}},
    h("div",{style:{fontWeight:"700",marginBottom:"12px",color:"#4ade80",fontSize:"14px"}},"✅ Valor a Entregar"),
    h("div",{class:"row"},h("span",{style:{color:"#aaa"}},"Faturado"),h("span",{id:"c_fat_r",style:{color:"#4ade80"}},"+ "+eur(c.fat))),
    h("div",{class:"row"},h("span",{style:{color:"#aaa"}},"Comissão c/ IVA"),h("span",{id:"c_com_r",style:{color:"#f87171"}},"− "+eur(c.com))),
    h("div",{class:"row"},h("span",{style:{color:"#aaa"}},"Combustível"),h("span",{id:"c_comb_r",style:{color:"#f87171"}},"− "+eur(c.comb))),
    h("div",{class:"row"},h("span",{style:{color:"#aaa"}},"Portagens"),h("span",{id:"c_port_r",style:{color:"#4ade80"}},"+ "+eur(c.port))),
    h("div",{class:"row"},h("span",{style:{color:"#aaa"}},"Outras Despesas"),h("span",{id:"c_outras_r",style:{color:"#f87171"}},"− "+eur(c.outras))),
    h("div",{class:"row",style:{marginBottom:"10px"}},h("span",{style:{color:"#aaa"}},"Multibanco"),h("span",{id:"c_mb_r",style:{color:"#f87171"}},"− "+eur(c.mb))),
    h("div",{style:{background:c.entr>=0?"#4ade8022":"#f8717122",borderRadius:"10px",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
      h("span",{style:{fontWeight:"700",fontSize:"15px"}},"Entregar"),
      h("span",{id:"c_entr",style:{fontWeight:"800",fontSize:"24px",color:c.entr>=0?"#4ade80":"#f87171"}},eur(c.entr))
    )
  ));

  // Adiciona listeners de cálculo em tempo real (sem re-render)
  setTimeout(()=>{
    ["f_kmI","f_kmF","f_fat","f_mb","f_port","f_comb"].forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.addEventListener("input",()=>{ editBuffer_sync(); updateCalc(); });
    });
  },0);

  return wrap;
}

function editBuffer_sync(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:"";};
  B.kmI=g("f_kmI");B.kmF=g("f_kmF");B.fat=g("f_fat");
  B.mb=g("f_mb");B.port=g("f_port");B.comb=g("f_comb");B.obs=g("f_obs");
}

function mkField(label,id,value,placeholder){
  const wrap=document.createElement("div");
  const sp=document.createElement("span");
  sp.className="lbl"; sp.textContent=label;
  const inp=document.createElement("input");
  inp.type="number"; inp.id=id; inp.className="inp";
  inp.placeholder=placeholder; inp.value=value||"";
  wrap.append(sp,inp);
  return wrap;
}

function renderHistorico(){
  const wrap=h("div",{});
  wrap.append(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}},
    h("div",{style:{fontWeight:"700",fontSize:"16px",color:"#facc15"}},"📋 Histórico de Dias"),
    h("button",{style:{background:"#333",border:"none",borderRadius:"8px",padding:"6px 12px",color:"#aaa",fontSize:"11px",cursor:"pointer"},
      onclick:async()=>{
        S.loadedMonths[S.date.slice(0,7)]=false;
        await loadMonth(S.date.slice(0,7));
        render();
      }},"🔄 Sincronizar")
  ));
  const dates=Object.keys(S.records).sort((a,b)=>b.localeCompare(a));
  if(!dates.length){wrap.append(h("div",{style:{textAlign:"center",color:"#555",padding:"40px"}},"Nenhum registo carregado."));return wrap;}
  dates.forEach(d=>{
    const c=calc(newBuf(getDay(d)));
    const isT=d===today();
    wrap.append(h("div",{style:{background:"#1e1e1e",borderRadius:"12px",padding:"14px",marginBottom:"10px",cursor:"pointer",border:isT?"1px solid #facc1566":"1px solid transparent"},
      onclick:()=>{syncBufferFromDOM();B=newBuf(getDay(d));S.date=d;S.tab=0;render();}},
      h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"8px"}},
        h("div",{style:{fontWeight:"700",fontSize:"14px"}},(isT?"🟡 Hoje":"📅")+" "+d),
        h("div",{style:{fontWeight:"800",fontSize:"16px",color:c.entr>=0?"#4ade80":"#f87171"}},eur(c.entr))
      ),
      h("div",{style:{display:"flex",gap:"12px",fontSize:"12px",color:"#aaa",flexWrap:"wrap"}},
        h("span",{},"🛣️ "+km(c.tkm)),h("span",{},"💶 "+eur(c.fat)),
        h("span",{},"📊 "+eur(c.com)),h("span",{},"🧾 "+eur(c.outras))
      )
    ));
  });
  return wrap;
}

    h("span",{style:{fontSize:"13px",color:"#aaa"}},"Mês:"),
    h("input",{type:"month",value:S.month,style:{background:"#222",border:"1px solid #444",color:"#fff",borderRadius:"8px",padding:"4px 10px",fontSize:"13px"},
      onchange:async e=>{S.month=e.target.value;await loadMonth(S.month);render();}}),
    h("button",{style:{marginLeft:"auto",background:"#333",border:"none",borderRadius:"8px",padding:"6px 12px",color:"#aaa",fontSize:"11px",cursor:"pointer"},

  ));
  const mD=Object.keys(S.records).filter(d=>d.startsWith(S.month));
  if(!mD.length){wrap.append(h("div",{style:{textAlign:"center",color:"#555",padding:"40px"}},"Sem registos. Clica em 🔄"));return wrap;}
  const st=mD.reduce((a,d)=>{const c=calc(newBuf(getDay(d)));return{km:a.km+c.tkm,fat:a.fat+c.fat,mb:a.mb+c.mb,din:a.din+c.din,desp:a.desp+c.outras+c.comb+c.port,com:a.com+c.com,entr:a.entr+c.entr,dias:a.dias+1};},{km:0,fat:0,mb:0,din:0,desp:0,com:0,entr:0,dias:0});
  const grid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}});
  [["Dias",st.dias+" dias","#facc15"],["KM",km(st.km),"#facc15"],["Faturado",eur(st.fat),"#4ade80"],["Multibanco",eur(st.mb),"#60a5fa"],["Dinheiro",eur(st.din),"#60a5fa"],["Despesas",eur(st.desp),"#f87171"],["Comissões",eur(st.com),"#c084fc"]].forEach(([l,v,c])=>
    grid.append(h("div",{style:{background:"#1e1e1e",borderRadius:"10px",padding:"12px 14px"}},h("div",{style:{fontSize:"11px",color:"#666",marginBottom:"4px"}},l),h("div",{style:{fontWeight:"700",fontSize:"16px",color:c}},v)))
  );
  wrap.append(grid);
  wrap.append(h("div",{style:{background:"linear-gradient(135deg,#1a2e1a,#1e1e1e)",border:"1px solid #4ade8044",borderRadius:"12px",padding:"16px"}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
      h("div",{},h("div",{style:{fontSize:"12px",color:"#aaa",marginBottom:"4px"}},"💰 Entregar do Mês"),h("div",{style:{fontSize:"11px",color:"#555"}},"Média: "+eur(st.entr/st.dias)+" / dia")),
      h("div",{style:{fontWeight:"800",fontSize:"28px",color:st.entr>=0?"#4ade80":"#f87171"}},eur(st.entr))
    )
  ));
  return wrap;
}

function renderResumo(){
  const wrap=h("div",{});
  wrap.append(h("div",{style:{fontWeight:"700",fontSize:"16px",marginBottom:"4px",color:"#facc15"}},"📊 Resumo Mensal"));
  wrap.append(h("div",{style:{fontSize:"12px",color:"#666",marginBottom:"16px"}},"Indicadores de performance"));
  wrap.append(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"20px"}},
    h("span",{style:{fontSize:"13px",color:"#aaa"}},"Mês:"),
    h("input",{type:"month",value:S.month,style:{background:"#222",border:"1px solid #444",color:"#fff",borderRadius:"8px",padding:"4px 10px",fontSize:"13px"},
      onchange:async e=>{S.month=e.target.value;await loadMonth(S.month);render();}})
  ));
  const mD=Object.keys(S.records).filter(d=>d.startsWith(S.month));
  if(!mD.length){wrap.append(h("div",{style:{textAlign:"center",color:"#555",padding:"40px"}},"Sem registos."));return wrap;}
  const ds=mD.map(d=>calc(newBuf(getDay(d))));
  const tKm=ds.reduce((s,d)=>s+d.tkm,0),tV=ds.reduce((s,d)=>s+d.fat,0),tMb=ds.reduce((s,d)=>s+d.mb,0);
  const tC=ds.reduce((s,d)=>s+d.comb,0),tP=ds.reduce((s,d)=>s+d.port,0);
  const tIva=ds.reduce((s,d)=>s+d.ivaV,0),tComB=ds.reduce((s,d)=>s+d.comB,0),tCom=ds.reduce((s,d)=>s+d.com,0);
  const dias=ds.length;
  const cats={};let tDep=0;
  mD.forEach(d=>(getDay(d).expenses||[]).forEach(e=>{
    if(e.category==="Depósito") tDep+=(parseFloat(e.valor)||0);
    else cats[e.category]=(cats[e.category]||0)+(parseFloat(e.valor)||0);
  }));
  const tOut=Object.values(cats).reduce((s,v)=>s+v,0);
  const tEntr=tV-tCom-tC+tP-tOut-tDep-tMb;

  function kpi(icon,title,value,sub,color){
    return h("div",{style:{background:"#1e1e1e",borderRadius:"12px",padding:"16px",marginBottom:"10px",border:`1px solid ${color}33`}},
      h("div",{style:{fontSize:"11px",color:"#777",marginBottom:"6px"}},icon+" "+title),
      h("div",{style:{fontWeight:"800",fontSize:"22px",color}},value),
      sub?h("div",{style:{fontSize:"11px",color:"#666",marginTop:"4px"}},sub):null
    );
  }

  wrap.append(h("div",{style:{fontSize:"11px",color:"#facc15",fontWeight:"700",letterSpacing:"1px",marginBottom:"8px",textTransform:"uppercase"}},"📍 Quilómetros"));
  wrap.append(kpi("🛣️","Média de KM por Dia",(tKm/dias).toFixed(1)+" km",`Total: ${tKm.toFixed(0)} km em ${dias} dias`,"#facc15"));
  wrap.append(kpi("💶","Faturado/KM — Dia","€"+(ds.reduce((s,d)=>s+(d.tkm>0?d.fat/d.tkm:0),0)/dias).toFixed(3)+"/km","Média KM diário","#60a5fa"));
  wrap.append(kpi("📈","Faturado/KM — Acumulado","€"+(tKm>0?tV/tKm:0).toFixed(3)+"/km","Média KM Mensal","#60a5fa"));
  wrap.append(h("div",{style:{fontSize:"11px",color:"#f87171",fontWeight:"700",letterSpacing:"1px",margin:"16px 0 8px",textTransform:"uppercase"}},"⛽ Combustível"));
  wrap.append(kpi("⛽","Custo por 100 km",eur(tKm>0?(tC/tKm)*100:0)+"/100km",`${eur(tC)} gastos · ${tKm.toFixed(0)} km`,"#f87171"));
  wrap.append(h("div",{style:{fontSize:"11px",color:"#c084fc",fontWeight:"700",letterSpacing:"1px",margin:"16px 0 8px",textTransform:"uppercase"}},"📊 Comissão"));
  wrap.append(kpi("🧾","Total IVA da Comissão",eur(tIva),`Base: ${eur(tComB)} · IVA: ${eur(tIva)}`,"#c084fc"));
  wrap.append(h("div",{style:{fontSize:"11px",color:"#4ade80",fontWeight:"700",letterSpacing:"1px",margin:"16px 0 8px",textTransform:"uppercase"}},"💰 Valor a Entregar"));

  const card=h("div",{style:{background:tEntr>=0?"#1a2e1a":"#2e1a1a",border:`1px solid ${tEntr>=0?"#4ade80":"#f87171"}55`,borderRadius:"14px",padding:"18px",marginBottom:"10px"}});
  const lines=h("div",{style:{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"14px"}});
  const lr=(l,v,c,op)=>h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px"}},h("span",{style:{color:"#888"}},l),h("span",{style:{color:c,fontWeight:"600"}},op+" "+v));
  lines.append(lr("💶 Total Faturado",eur(tV),"#4ade80","+"));
  lines.append(lr("📊 Comissão c/ IVA",eur(tCom),"#c084fc","−"));
  lines.append(lr("⛽ Combustível",eur(tC),"#f87171","−"));
  lines.append(lr("💳 Multibanco",eur(tMb),"#60a5fa","−"));
  if(tDep>0) lines.append(lr("🏦 Depósito Bancário",eur(tDep),"#60a5fa","−"));
  const ce=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  if(ce.length){
    lines.append(h("div",{style:{fontSize:"11px",color:"#666",margin:"6px 0 2px",fontWeight:"600",textTransform:"uppercase"}},"🧾 Outras Despesas"));
    ce.forEach(([cat,val])=>lines.append(h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px",paddingLeft:"12px"}},h("span",{style:{color:"#888"}},"· "+cat),h("span",{style:{color:"#f87171",fontWeight:"600"}},"− "+eur(val)))));
    if(ce.length>1) lines.append(h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"12px",paddingLeft:"12px",marginTop:"2px"}},h("span",{style:{color:"#666"}},"Total outras"),h("span",{style:{color:"#f87171"}},"− "+eur(tOut))));
  }
  if(tP>0) lines.append(lr("🛣️ Portagens (cliente)",eur(tP),"#4ade80","+"));
  card.append(lines);
  card.append(h("div",{style:{height:"1px",background:"#333",marginBottom:"14px"}}));
  card.append(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
    h("span",{style:{fontWeight:"700",fontSize:"14px"}},"Total a Entregar"),
    h("span",{style:{fontWeight:"800",fontSize:"28px",color:tEntr>=0?"#4ade80":"#f87171"}},eur(tEntr))
  ));
  wrap.append(card);
  return wrap;
}

function renderExpModal(){
  return h("div",{style:{position:"fixed",inset:"0",background:"#000a",display:"flex",alignItems:"flex-end",zIndex:"100"},

    h("div",{style:{background:"#1e1e1e",borderRadius:"20px 20px 0 0",padding:"24px",width:"100%",maxWidth:"420px",margin:"0 auto"}},
      h("div",{style:{fontWeight:"700",fontSize:"16px",marginBottom:"16px",color:"#f87171"}},S.editExpIdx!==null?"✏️ Editar Despesa":"➕ Nova Despesa"),
      h("div",{style:{marginBottom:"12px"}},
        h("span",{style:{fontSize:"11px",color:"#888",display:"block",marginBottom:"6px"}},"Tipo"),
        h("div",{style:{display:"flex",flexWrap:"wrap",gap:"6px"}},...CATS.map(c=>h("button",{
          style:{padding:"6px 12px",borderRadius:"8px",border:"none",cursor:"pointer",fontSize:"12px",fontWeight:"600",
            background:S.expForm.cat===c?"#f87171":"#2a2a2a",color:S.expForm.cat===c?"#fff":"#aaa"},
          onclick:()=>{S.expForm.cat=c;render();}},c)))
      ),
      h("div",{style:{marginBottom:"12px"}},
        h("span",{style:{fontSize:"11px",color:"#888",display:"block",marginBottom:"6px"}},"Descrição (opcional)"),
        h("input",{class:"inp",placeholder:"Ex: Oficina XPTO",value:S.expForm.desc,style:{fontSize:"14px"},oninput:e=>{S.expForm.desc=e.target.value;}})
      ),
      h("div",{style:{marginBottom:"20px"}},
        h("span",{style:{fontSize:"11px",color:"#888",display:"block",marginBottom:"6px"}},"Valor (€)"),
        h("input",{type:"number",class:"inp",placeholder:"0.00",value:S.expForm.val,style:{fontSize:"20px",fontWeight:"700"},oninput:e=>{S.expForm.val=e.target.value;}})
      ),
      h("div",{style:{display:"flex",gap:"10px"}},
        h("button",{style:{flex:"1",padding:"12px",background:"#333",border:"none",borderRadius:"10px",color:"#aaa",fontWeight:"700",cursor:"pointer"},onclick:()=>{S.expModal=false;render();}},"Cancelar"),
        h("button",{style:{flex:"2",padding:"12px",background:"#f87171",border:"none",borderRadius:"10px",color:"#fff",fontWeight:"700",cursor:"pointer",fontSize:"15px"},
          onclick:()=>{
            if(!S.expForm.val) return;
            const exp={category:S.expForm.cat,desc:S.expForm.desc,valor:S.expForm.val};
            if(S.editExpIdx!==null) B.exps[S.editExpIdx]=exp;
            else B.exps.push(exp);
            S.expModal=false;
            render();
          }},S.editExpIdx!==null?"Guardar":"Adicionar")
      )
    )
  );
}
