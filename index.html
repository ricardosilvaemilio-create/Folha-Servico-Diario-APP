<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Táxi – Aurélio Sardinha</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    font-family: 'Inter', Arial, sans-serif;
    background: #111;
  }

  /* ── CARD: ocupa ecrã todo em mobile, A4 landscape em desktop ── */
  .card {
    width: 100vw;
    height: 100vh;
    background: #111;
    display: grid;
    grid-template-rows: 15vh 1fr;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  .top-bar {
    background: #F5C518;
    display: flex;
    align-items: center;
    padding: 0 4vw;
    gap: 3vw;
  }
  .taxi-icon { font-size: clamp(20px, 5vw, 36px); flex-shrink: 0; }
  .name-block { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .name-label {
    font-size: clamp(8px, 1.5vw, 12px);
    font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: #7a6000;
  }
  .name-text {
    font-size: clamp(18px, 5.5vw, 42px);
    font-weight: 900; color: #1a1a1a;
    letter-spacing: -0.02em; line-height: 1.1; white-space: nowrap;
  }
  .avail-inline {
    font-size: clamp(9px, 2vw, 16px);
    font-weight: 700; color: #1a1a1a;
    letter-spacing: 0.08em; text-transform: uppercase;
    display: flex; align-items: center; gap: 5px; margin-top: 2px;
  }
  .avail-dot {
    display: inline-block; width: clamp(6px,1.2vw,10px); height: clamp(6px,1.2vw,10px);
    background: #1a6b3a; border-radius: 50%; flex-shrink: 0;
  }
  .right-block {
    display: flex; align-items: center; gap: 3vw; flex-shrink: 0;
  }
  .phone-badge {
    background: #1a1a1a; color: #F5C518;
    font-size: clamp(14px, 4vw, 32px);
    font-weight: 900; letter-spacing: 0.04em;
    padding: clamp(6px,1.5vh,14px) clamp(10px,2.5vw,20px);
    border-radius: 8px; white-space: nowrap;
  }
  .qr-mini {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .qr-mini img {
    border-radius: 5px; background: #fff;
    padding: 4px; display: block;
    width: clamp(50px, 10vh, 90px);
    height: clamp(50px, 10vh, 90px);
  }
  .qr-mini-label {
    font-size: clamp(6px, 1.2vw, 9px);
    font-weight: 700; color: #1a1a1a;
    letter-spacing: 0.06em; text-transform: uppercase; text-align: center;
  }

  /* ── IMAGE GRID ── */
  .bottom-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
    overflow: hidden;
  }
  .img-cell {
    position: relative; overflow: hidden;
    border-right: none;
  }
  .img-cell:last-child { border-right: none; }
  .img-cell img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    display: block;
    filter: brightness(0.62) saturate(0.85);
  }
  .img-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.88), transparent);
    padding: clamp(16px,4vh,40px) clamp(4px,1vw,10px) clamp(6px,1.5vh,14px);
    font-size: clamp(8px, 1.4vw, 14px);
    font-weight: 700; color: #fff;
    text-align: center; letter-spacing: 0.05em; text-transform: uppercase;
    line-height: 1.2; white-space: nowrap;
  }
  .img-label span {
    display: block;
    font-size: clamp(7px, 1.1vw, 11px);
    font-weight: 500; color: #F5C518;
    letter-spacing: 0.08em; margin-top: 2px; white-space: nowrap;
  }

  /* ── PRINT ── */
  @media print {
    html, body { background: #111; margin: 0; padding: 0; }
    .card {
      width: 297mm; height: 210mm;
      page-break-after: avoid;
      grid-template-rows: 30mm 1fr;
    }
    .bottom-grid {
      height: 180mm;
    }
    .img-cell {
      position: relative;
      overflow: hidden;
      border-right: none !important;
    }
    .img-cell img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      filter: brightness(0.62) saturate(0.85);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .img-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 2;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .top-bar {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    @page { size: A4 landscape; margin: 0; }
  }
</style>
</head>
