<title>Folha de Serviço Diário - Táxi</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #111; color: #fff; }
  #app { max-width: 420px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
  input, button { font-family: inherit; }
  ::placeholder { color: #555; }
  .inp { background:#2a2a2a; color:#fff; border:1px solid #444; border-radius:8px; padding:8px 12px; width:100%; font-size:15px; outline:none; }
  .inp:focus { border-color:#facc15; }
  .card { background:#1e1e1e; border-radius:12px; padding:16px; margin-bottom:12px; }
  .lbl { font-size:11px; color:#888; display:block; margin-bottom:4px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .row { display:flex; justify-content:space-between; align-items:center; font-size:13px; margin-bottom:6px; }
  .spin { animation:spin 1s linear infinite; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #login-screen { position:fixed; inset:0; background:#111; display:flex; align-items:center; justify-content:center; z-index:999; padding:24px; }
  #login-box { background:#1e1e1e; border-radius:20px; padding:32px 24px; width:100%; max-width:360px; text-align:center; }
  #login-box .taxi-icon { font-size:48px; margin-bottom:8px; }
  #login-box h2 { margin:0 0 4px; font-size:20px; color:#facc15; }
  #login-box p { margin:0 0 24px; font-size:13px; color:#666; }
  #login-input { background:#2a2a2a; color:#fff; border:2px solid #333; border-radius:10px; padding:12px 16px; width:100%; font-size:18px; outline:none; text-align:center; letter-spacing:4px; transition:border-color .2s; }
  #login-input:focus { border-color:#facc15; }
  #login-btn { margin-top:14px; width:100%; padding:13px; background:#facc15; border:none; border-radius:10px; color:#111; font-weight:800; font-size:16px; cursor:pointer; transition:opacity .2s; }
  #login-btn:hover { opacity:.85; }
  #login-err { color:#f87171; font-size:13px; margin-top:10px; min-height:18px; }
  #login-remember { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:14px; font-size:13px; color:#aaa; cursor:pointer; }
  #login-remember input { width:16px; height:16px; accent-color:#facc15; cursor:pointer; }
</style>

    <h2>Folha de Serviço</h2>
    <p>Registo Diário de Táxi</p>
    <input id="login-input" type="password" placeholder="••••••" maxlength="20" autocomplete="current-password" />
    <button id="login-btn" onclick="tentarLogin()">Entrar</button>
    <div id="login-err"></div>

      <input type="checkbox" id="login-lembrar" /> Lembrar durante 7 dias
    </label>
  </div>
</div>
<div id="app" style="display:none"></div>
<div id="modals"></div>
<script>
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbxneL-oZ7UXtoO9Z9hlM6iZQE4BNFubuAy2tY7BV29kMc0YEE7EqGNTEyk9WiCBbheuzQ/exec";
const CR = 0.40, IVA = 0.23;
const CATS = ["Depósito","Extintor","Inspeção","Lavagem","Oficina","Outros"];

let S = {
  url: BACKEND_URL, loading: false, syncing: false, saved: false, err: "",
  records: {}, tab: 0, date: today(), month: today().slice(0,7),
  loadedMonths: {}, expModal: false, deleteModal: false, viaturaMod: false,
  editExpIdx: null, expForm: {cat:CATS[0],desc:"",val:""},
  anual: null, resumoTab: "mensal"
};
let B = newBuf();

function today() { return new Date().toISOString().split("T")[0]; }
function eur(v) { return "€"+Number(v||0).toFixed(2); }
function fkm(v) { return Number(v||0).toFixed(0)+" km"; }
function newBuf(d) {
  d=d||{};
  return {kmI:d.kmInicial||"",kmF:d.kmFinal||"",fat:d.valorFaturado||"",
    mb:d.multibanco||"",port:d.portagens||"",comb:d.combustivel||"",
    obs:d.obs||"",exps:JSON.parse(JSON.stringify(d.expenses||[]))};
}
function getDay(d) { return S.records[d]||{}; }
function calc(b) {
  const kmI=parseFloat(b.kmI)||0, kmF=parseFloat(b.kmF)||0, tkm=kmF>kmI?kmF-kmI:0;
  const fat=parseFloat(b.fat)||0, mb=parseFloat(b.mb)||0;
  const port=parseFloat(b.port)||0, comb=parseFloat(b.comb)||0;
  const dep=(b.exps||[]).filter(e=>e.category==="Depósito").reduce((s,e)=>s+(parseFloat(e.valor)||0),0);
  const outras=(b.exps||[]).filter(e=>e.category!=="Depósito").reduce((s,e)=>s+(parseFloat(e.valor)||0),0);
  const comB=fat*CR, ivaV=comB*IVA, com=comB+ivaV;
  const entr=fat-com-comb+port-outras-dep-mb;
  return {tkm,fat,mb,port,comb,outras,dep,comB,ivaV,com,entr,din:fat-mb};
}
function syncDOM() {
  const g=id=>{const e=document.getElementById(id);return e?e.value:"";};
  B.kmI=g("f_kmI");B.kmF=g("f_kmF");B.fat=g("f_fat");
  B.mb=g("f_mb");B.port=g("f_port");B.comb=g("f_comb");B.obs=g("f_obs");
}
function canSave() {
  const a=document.getElementById("f_kmI"),b=document.getElementById("f_kmF");
  const vi=a?a.value:(B.kmI||""),vf=b?b.value:(B.kmF||"");
  return vi.toString().trim()!==""&&parseFloat(vi)>0&&vf.toString().trim()!==""&&parseFloat(vf)>0;
}

async function apiGet(action,params={}) {
  const u=new URL(S.url);u.searchParams.set("action",action);
  for(const k in params)u.searchParams.set(k,params[k]);
  return (await fetch(u.toString())).json();
}
async function apiPost(body) {
  return (await fetch(S.url,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(body)})).json();
}
async function loadMonth(m) {
  if(S.loadedMonths[m])return;
  S.loading=true;S.err="";render();
  try {
    const d=await apiGet("getMonth",{month:m});
    if(d.error)throw new Error(d.error);
    (d.days||[]).forEach(r=>{S.records[r.date]={kmInicial:r.kmInicial,kmFinal:r.kmFinal,valorFaturado:r.valorFaturado,multibanco:r.multibanco,portagens:r.portagens,combustivel:r.combustivel,obs:r.obs||"",expenses:r.expenses||[]};});
    S.loadedMonths[m]=true;
  }catch(e){S.err="Erro: "+e.message;}
  S.loading=false;render();
}
function getPrevKm(date) {
  const dates=Object.keys(S.records).sort((a,b)=>a.localeCompare(b));
  const idx=dates.indexOf(date);
  if(idx>0)return parseFloat(getDay(dates[idx-1]).kmFinal)||0;
  const prev=new Date(date);prev.setDate(prev.getDate()-1);
  return parseFloat((S.records[prev.toISOString().split("T")[0]]||{}).kmFinal)||0;
}
function initBuf(date) {
  const day=getDay(date),buf=newBuf(day);
  if((!buf.kmI||parseFloat(buf.kmI)===0)&&!day.kmInicial){
    const p=getPrevKm(date);if(p>0)buf.kmI=p.toString();
  }
  return buf;
}
async function saveDay() {
  syncDOM();
  const date=S.date;
  S.records[date]={kmInicial:B.kmI,kmFinal:B.kmF,valorFaturado:B.fat,multibanco:B.mb,portagens:B.port,combustivel:B.comb,obs:B.obs,expenses:JSON.parse(JSON.stringify(B.exps))};
  S.syncing=true;S.err="";updateStatus();
  try {
    await apiPost({action:"saveDay",data:date,day:{kmInicial:B.kmI,kmFinal:B.kmF,valorFaturado:B.fat,multibanco:B.mb,portagens:B.port,combustivel:B.comb,obs:B.obs,expenses:B.exps}});
    S.saved=true;S.syncing=false;updateStatus();
    setTimeout(()=>{S.saved=false;updateStatus();},2000);
    enviarEmailDia(date, B, calc(B));
    // Verificar se é o último dia do mês
    const [_y,_m,_d]=date.split("-").map(Number);
    const ultimoDia=new Date(_y,_m,0).getDate();
    if(_d===ultimoDia){
      await loadMonth(date.slice(0,7));
      enviarEmailMensal(date.slice(0,7));
    }
  }catch(e){S.err="Falha: "+e.message;S.syncing=false;updateStatus();}
}
async function deleteDayFn() {
  S.syncing=true;updateStatus();
  try {
    await apiPost({action:"deleteDay",data:S.date});
    delete S.records[S.date];B=newBuf();
  }catch(e){S.err="Falha: "+e.message;}
  S.syncing=false;S.deleteModal=false;render();
}
function updateStatus() {
  const can=canSave();
  const btn=document.getElementById("btn_save");
  const spin=document.getElementById("hdr_spin");
  const errEl=document.getElementById("err_bar");
  if(btn){btn.textContent=S.saved?"✅ Guardado!":"💾 Gravar Dia";btn.style.background=S.saved?"#16a34a":can?"#facc15":"#444";btn.style.color=can?"#111":"#888";btn.style.cursor=can?"pointer":"not-allowed";btn.onclick=can?saveDay:null;}
  if(spin)spin.style.display=S.syncing?"inline-block":"none";
  if(errEl){errEl.textContent=S.err?"⚠️ "+S.err:"";errEl.style.display=S.err?"block":"none";}
  updateCalc();
}
function updateCalc() {
  const g=id=>{const e=document.getElementById(id);return e?e.value:"";};
  const b={kmI:g("f_kmI"),kmF:g("f_kmF"),fat:g("f_fat"),mb:g("f_mb"),port:g("f_port"),comb:g("f_comb"),exps:B.exps};
  const c=calc(b);
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set("c_tkm",fkm(c.tkm));set("c_din",eur(c.din));
  set("c_comB","Base (40% de "+eur(c.fat)+"): "+eur(c.comB));
  set("c_iva","IVA (23%): "+eur(c.ivaV));
  set("c_com",eur(c.com));
  set("c_fat_r","+ "+eur(c.fat));set("c_com_r","− "+eur(c.com));
  set("c_comb_r","− "+eur(c.comb));set("c_port_r","+ "+eur(c.port));
  set("c_outras_r","− "+eur(c.outras));set("c_dep_r","− "+eur(c.dep));set("c_mb_r","− "+eur(c.mb));
  set("c_entr",eur(c.entr));
  const el=document.getElementById("c_entr");if(el)el.style.color=c.entr>=0?"#4ade80":"#f87171";
}

function h(tag,attrs,...kids) {
  const e=document.createElement(tag);
  for(const k in (attrs||{})){
    if(k==="style")Object.assign(e.style,attrs[k]);
    else if(k==="class")e.className=attrs[k];
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  }
  kids.flat().forEach(c=>{if(c!=null)e.append(c instanceof Node?c:document.createTextNode(String(c)));});
  return e;
}

function render() {
  const root=document.getElementById("app"),mods=document.getElementById("modals");
  root.innerHTML="";mods.innerHTML="";
  root.append(renderHeader());
  root.append(h("div",{id:"err_bar",style:{margin:"10px 16px 0",background:"#2e1a1a",border:"1px solid #f8717155",borderRadius:"10px",padding:"8px 12px",fontSize:"11px",color:"#f87171",display:S.err?"block":"none"}},"⚠️ "+(S.err||"")));
  if(S.loading){root.append(h("div",{style:{textAlign:"center",padding:"60px",color:"#888"}},"A carregar..."));}
  else{
    const c=h("div",{style:{padding:"16px"}});
    if(S.tab===0)c.append(renderHoje());
    else if(S.tab===1)c.append(renderHistorico());

function renderResumoMensal() {
  const wrap=h("div",{});
  wrap.append(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"20px"}},
    h("span",{style:{fontSize:"13px",color:"#aaa"}},"Mês:"),
    h("input",{type:"month",value:S.month,style:{background:"#222",border:"1px solid #444",color:"#fff",borderRadius:"8px",padding:"4px 10px",fontSize:"13px"},
      onchange:async e=>{S.month=e.target.value;await loadMonth(S.month);render();}}),
    h("button",{style:{marginLeft:"auto",background:"#333",border:"none",borderRadius:"8px",padding:"6px 10px",color:"#4ade80",fontSize:"11px",cursor:"pointer",fontWeight:"700"},
      onclick:async()=>{
        const ano=today().slice(0,4);
        for(const m of ["01","02","03","04","05","06","07","08","09","10","11","12"]){
          S.loadedMonths[ano+"-"+m]=false;
          await loadMonth(ano+"-"+m);
        }
        render();
      }},"🔄 Ano")
  ));
  const mD=Object.keys(S.records).filter(d=>d.startsWith(S.month));
  if(!mD.length){wrap.append(h("div",{style:{textAlign:"center",color:"#555",padding:"40px"}},"Sem registos para este mês."));return wrap;}
  const ds=mD.map(d=>calc(newBuf(getDay(d))));
  const tKm=ds.reduce((s,d)=>s+d.tkm,0),tVf=ds.reduce((s,d)=>s+d.fat,0),tMb=ds.reduce((s,d)=>s+d.mb,0);
  const tC=ds.reduce((s,d)=>s+d.comb,0),tP=ds.reduce((s,d)=>s+d.port,0);
  const tIva=ds.reduce((s,d)=>s+d.ivaV,0),tComB=ds.reduce((s,d)=>s+d.comB,0),tCom=ds.reduce((s,d)=>s+d.com,0);
  const dias=ds.filter(d=>d.fat>0).length;
  const cats={};let tDep=0;
  mD.forEach(d=>(getDay(d).expenses||[]).forEach(e=>{
    if(e.category==="Depósito")tDep+=(parseFloat(e.valor)||0);
    else cats[e.category]=(cats[e.category]||0)+(parseFloat(e.valor)||0);
  }));
  const tOut=Object.values(cats).reduce((s,v)=>s+v,0);

  const selDay=getDay(S.date);
  const sKmI=parseFloat(selDay.kmInicial)||0,sKmF=parseFloat(selDay.kmFinal)||0;

  const arTKm=arValsAno.reduce((s,r)=>{const a=parseFloat(r.kmInicial)||0,b=parseFloat(r.kmFinal)||0;return s+(b>a?b-a:0);},0);
  const arTFat=arValsAno.reduce((s,r)=>s+(parseFloat(r.valorFaturado)||0),0);
  const fatKmAnual=arTKm>0?arTFat/arTKm:0;

  function kpi(icon,title,value,sub,color){
    return h("div",{style:{background:"#1e1e1e",borderRadius:"12px",padding:"16px",marginBottom:"10px",border:`1px solid ${color}33`}},

  wrap.append(kpi("🛣️","Média de KM por Dia",(tKm/Math.max(dias,1)).toFixed(1)+" km","Total: "+tKm.toFixed(0)+" km em "+dias+" dias","#facc15"));
  wrap.append(kpi("💶","Faturado/KM — Dia ("+S.date+")","€"+(Math.round(fatKmDia*100)/100).toFixed(2)+"/km","Média KM Dia","#60a5fa"));

async function enviarEmailDia(date, b, c) {
  try {
    emailjs.init({publicKey: EJS_PUBLIC});
    const html = buildEmailHTML(date, b, c);
    const [y,m,d] = date.split("-");
    const assunto = "📋 Folha de Serviço — " + d + "/" + m + "/" + y;
    await Promise.all(EJS_EMAILS.map(email =>
      emailjs.send(EJS_SERVICE, EJS_TEMPLATE, {
        to_email: email,
        subject: assunto,
        html_content: html
      })
    ));
    console.log("Emails enviados com sucesso");
  } catch(e) {
    console.warn("Erro ao enviar email:", e);
  }
}

// --- EMAIL RELATÓRIO MENSAL ---
function buildEmailMensal(mes, registos) {
  const [y,m] = mes.split("-");
  const nomesMeses=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const nomeMes = nomesMeses[parseInt(m)-1] + " " + y;

  let diasTrab=0, totKm=0, totFat=0, totMb=0, totComb=0, totPort=0, totOutras=0, totDep=0, totCom=0, totEntr=0;
  const linhasDias = [];

  Object.entries(registos).filter(([d])=>d.startsWith(mes)).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date,r])=>{
    const b2={kmI:r.kmInicial,kmF:r.kmFinal,fat:r.valorFaturado,mb:r.multibanco,port:r.portagens,comb:r.combustivel,obs:r.obs,exps:r.expenses||[]};
    const c2=calc(b2);
    if((parseFloat(r.valorFaturado)||0)>0){
      diasTrab++;
      totKm+=c2.tkm; totFat+=c2.fat; totMb+=c2.mb; totComb+=c2.comb;
      totPort+=c2.port; totOutras+=c2.outras; totDep+=c2.dep; totCom+=c2.com; totEntr+=c2.entr;
      const [,, dd]=date.split("-");
      linhasDias.push(`<tr style="border-bottom:1px solid #2a2a2a;">
        <td style="padding:6px 8px;color:#aaa;font-size:12px;">${dd}/${m}</td>
        <td style="padding:6px 8px;color:#4ade80;font-size:12px;text-align:right;">${eur(c2.fat)}</td>
        <td style="padding:6px 8px;color:#c084fc;font-size:12px;text-align:right;">${eur(c2.com)}</td>
        <td style="padding:6px 8px;color:#facc15;font-size:12px;text-align:right;">${c2.tkm} km</td>
        <td style="padding:6px 8px;color:#4ade80;font-size:12px;text-align:right;">${eur(c2.entr)}</td>
      </tr>`);
    }
  });

  const mediaDia = diasTrab>0 ? totFat/diasTrab : 0;
  const totDesp = totComb+totPort+totOutras;

  return `<!DOCTYPE html>
<html lang="pt">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#f4f4f4;font-family:system-ui,-apple-system,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;padding:24px 0;">
<tr><td align="center">
<table width="100%" style="max-width:580px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.10);">

  <!-- HEADER -->
  <tr><td style="background:#1a1a1a;padding:28px 32px;text-align:center;">
    <div style="font-size:36px;margin-bottom:8px;">🚕</div>
    <div style="color:#facc15;font-size:22px;font-weight:800;letter-spacing:1px;">MJE Transporte</div>
    <div style="color:#888;font-size:13px;margin-top:4px;">Relatório Mensal</div>
  </td></tr>

  <!-- MÊS -->
  <tr><td style="background:#facc15;padding:14px 32px;text-align:center;">
    <div style="color:#111;font-size:18px;font-weight:800;">📅 ${nomeMes}</div>
  </td></tr>

  <!-- RESUMO -->
  <tr><td style="padding:28px 32px 0;">
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td style="background:#1e1e1e;border-radius:12px;padding:20px;">
          <div style="color:#888;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;">📊 Resumo do Mês</div>
          <table width="100%" cellpadding="0" cellspacing="0">
            <tr>
              <td style="color:#aaa;font-size:13px;padding:5px 0;">Dias Trabalhados</td>
              <td align="right" style="color:#facc15;font-weight:700;font-size:13px;">${diasTrab} dias</td>
            </tr>
            <tr>
              <td style="color:#aaa;font-size:13px;padding:5px 0;">KMs Totais</td>
              <td align="right" style="color:#facc15;font-weight:700;font-size:13px;">${totKm.toLocaleString()} km</td>
            </tr>
            <tr><td colspan="2" style="border-top:1px solid #333;padding:4px 0;"></td></tr>
            <tr>
              <td style="color:#aaa;font-size:13px;padding:5px 0;">Total Faturado</td>
              <td align="right" style="color:#4ade80;font-weight:700;font-size:13px;">${eur(totFat)}</td>
            </tr>
            <tr>
              <td style="color:#aaa;font-size:13px;padding:5px 0;">Média Diária Faturado</td>
              <td align="right" style="color:#4ade80;font-weight:700;font-size:13px;">${eur(mediaDia)}</td>
            </tr>
            <tr><td colspan="2" style="border-top:1px solid #333;padding:4px 0;"></td></tr>
            <tr>
              <td style="color:#aaa;font-size:13px;padding:5px 0;">Comissão Total (c/ IVA)</td>
              <td align="right" style="color:#c084fc;font-weight:700;font-size:13px;">${eur(totCom)}</td>
            </tr>
            <tr><td colspan="2" style="border-top:1px solid #333;padding:4px 0;"></td></tr>
            <tr>
              <td style="color:#aaa;font-size:13px;padding:5px 0;">Total Combustível</td>
              <td align="right" style="color:#f87171;font-weight:700;font-size:13px;">${eur(totComb)}</td>
            </tr>
            <tr>
              <td style="color:#aaa;font-size:13px;padding:5px 0;">Total Despesas</td>
              <td align="right" style="color:#f87171;font-weight:700;font-size:13px;">${eur(totDesp)}</td>
            </tr>
            <tr><td colspan="2" style="border-top:1px solid #333;padding:4px 0;"></td></tr>
            <tr>
              <td style="color:#fff;font-size:15px;font-weight:700;padding:6px 0;">Total a Entregar</td>
              <td align="right" style="color:#4ade80;font-weight:800;font-size:16px;">${eur(totEntr)}</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </td></tr>

  <!-- TABELA DIAS -->
  <tr><td style="padding:20px 32px 0;">
    <div style="color:#555;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">📋 Detalhe por Dia</div>
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#1e1e1e;border-radius:12px;overflow:hidden;">
      <tr style="background:#2a2a2a;">
        <td style="padding:8px 8px;color:#666;font-size:11px;font-weight:700;">Dia</td>
        <td style="padding:8px 8px;color:#666;font-size:11px;font-weight:700;text-align:right;">Faturado</td>
        <td style="padding:8px 8px;color:#666;font-size:11px;font-weight:700;text-align:right;">Comissão</td>
        <td style="padding:8px 8px;color:#666;font-size:11px;font-weight:700;text-align:right;">KMs</td>
        <td style="padding:8px 8px;color:#666;font-size:11px;font-weight:700;text-align:right;">Entregar</td>
      </tr>
      ${linhasDias.join("")}
    </table>
  </td></tr>

  <!-- FOOTER -->
  <tr><td style="background:#1a1a1a;padding:20px 32px;text-align:center;margin-top:28px;">
    <div style="color:#555;font-size:11px;">MJE — Transporte Ocasional de Passageiros</div>
    <div style="color:#444;font-size:10px;margin-top:4px;">Relatório Mensal gerado automaticamente</div>
  </td></tr>

</table>
</td></tr>
</table>
</body></html>`;
}

async function enviarEmailMensal(mes) {
  try {
    emailjs.init({publicKey: EJS_PUBLIC});
    const html = buildEmailMensal(mes, S.records);
    const [y,m] = mes.split("-");
    const nomesMeses=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    const assunto = "📊 Relatório Mensal — " + nomesMeses[parseInt(m)-1] + " " + y;
    await Promise.all(EJS_EMAILS.map(email =>
      emailjs.send(EJS_SERVICE, EJS_TEMPLATE, {
        to_email: email,
        subject: assunto,
        html_content: html
      })
    ));
    console.log("Relatório mensal enviado com sucesso");
  } catch(e) {
    console.warn("Erro ao enviar relatório mensal:", e);
  }
}

// --- LOGIN ---
const LOGIN_KEY = "fsd_auth";
const LOGIN_PW = "cr4";
function sessaoValida(){
  try{
    const s=JSON.parse(localStorage.getItem(LOGIN_KEY)||"null");
    if(!s||s.pw!==LOGIN_PW)return false;
    if(s.expiry&&Date.now()>s.expiry){localStorage.removeItem(LOGIN_KEY);return false;}
    return true;
  }catch(e){return false;}
}
function mostrarApp(){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="";
  render();
  loadMonth(S.date.slice(0,7)).then(()=>{B=initBuf(S.date);render();});
}
function tentarLogin(){
  const pw=document.getElementById("login-input").value;
  const err=document.getElementById("login-err");
  if(pw===LOGIN_PW){
    const lembrar=document.getElementById("login-lembrar").checked;
    if(lembrar){
      localStorage.setItem(LOGIN_KEY,JSON.stringify({pw:LOGIN_PW,expiry:Date.now()+7*24*60*60*1000}));
    }
    mostrarApp();
  } else {
    err.textContent="Password incorreta. Tenta novamente.";
    document.getElementById("login-input").value="";
    document.getElementById("login-input").focus();
  }
}
document.addEventListener("DOMContentLoaded",()=>{
  const inp=document.getElementById("login-input");
  if(inp)inp.addEventListener("keydown",e=>{if(e.key==="Enter")tentarLogin();});
  if(sessaoValida()){mostrarApp();}
});
</script>
