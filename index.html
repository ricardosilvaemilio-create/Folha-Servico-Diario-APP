<head>
<meta charset="UTF-8">

<title>Folha de Serviço Diário - Táxi</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #111; color: #fff; }
  #app { max-width: 420px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
  input, button { font-family: inherit; }
  ::placeholder { color: #555; }
  .inp { background:#2a2a2a; color:#fff; border:1px solid #444; border-radius:8px; padding:8px 12px; width:100%; font-size:15px; outline:none; }
  .inp:focus { border-color:#facc15; }
  .card { background:#1e1e1e; border-radius:12px; padding:16px; margin-bottom:12px; }
  .lbl { font-size:11px; color:#888; display:block; margin-bottom:4px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .row { display:flex; justify-content:space-between; align-items:center; font-size:13px; margin-bottom:6px; }
  .spin { animation:spin 1s linear infinite; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #login-screen { position:fixed; inset:0; background:#111; display:flex; align-items:center; justify-content:center; z-index:999; padding:24px; }
  #login-box { background:#1e1e1e; border-radius:20px; padding:32px 24px; width:100%; max-width:360px; text-align:center; }
  #login-box .taxi-icon { font-size:48px; margin-bottom:8px; }
  #login-box h2 { margin:0 0 4px; font-size:20px; color:#facc15; }
  #login-box p { margin:0 0 24px; font-size:13px; color:#666; }
  #login-input { background:#2a2a2a; color:#fff; border:2px solid #333; border-radius:10px; padding:12px 16px; width:100%; font-size:18px; outline:none; text-align:center; letter-spacing:4px; transition:border-color .2s; }
  #login-input:focus { border-color:#facc15; }
  #login-btn { margin-top:14px; width:100%; padding:13px; background:#facc15; border:none; border-radius:10px; color:#111; font-weight:800; font-size:16px; cursor:pointer; transition:opacity .2s; }
  #login-btn:hover { opacity:.85; }
  #login-err { color:#f87171; font-size:13px; margin-top:10px; min-height:18px; }
  #login-remember { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:14px; font-size:13px; color:#aaa; cursor:pointer; }
  #login-remember input { width:16px; height:16px; accent-color:#facc15; cursor:pointer; }
  #print-receipt { display:none; }
  @media print {
    body * { visibility:hidden !important; }
    #print-receipt, #print-receipt * { visibility:visible !important; }
    #print-receipt { display:block !important; position:absolute; top:0; left:0; width:57mm; padding:1mm 2mm; color:#000; background:#fff; }
    @page { size:57mm auto; margin:0; }
  }
</style>

<script>
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbxneL-oZ7UXtoO9Z9hlM6iZQE4BNFubuAy2tY7BV29kMc0YEE7EqGNTEyk9WiCBbheuzQ/exec";
const CR = 0.40, IVA = 0.23;
const CATS = ["Depósito","Extintor","Inspeção","Lavagem","Oficina","Outros"];

let S = {
  url: BACKEND_URL, loading: false, syncing: false, saved: false, err: "",
  records: {}, tab: 0, date: today(), month: today().slice(0,7),
  loadedMonths: {}, expModal: false, deleteModal: false, viaturaMod: false,
  editExpIdx: null, expForm: {cat:CATS[0],desc:"",val:""},
  anual: null, resumoTab: "mensal"
};
let B = newBuf();

function today() { return new Date().toISOString().split("T")[0]; }
function eur(v) { return "€"+Number(v||0).toFixed(2); }
function fkm(v) { return Number(v||0).toFixed(0)+" km"; }
function newBuf(d) {
  d=d||{};
  return {kmI:d.kmInicial||"",kmF:d.kmFinal||"",fat:d.valorFaturado||"",
    mb:d.multibanco||"",port:d.portagens||"",comb:d.combustivel||"",
    obs:d.obs||"",exps:JSON.parse(JSON.stringify(d.expenses||[]))};
}
function getDay(d) { return S.records[d]||{}; }
function calc(b) {
  const kmI=parseFloat(b.kmI)||0, kmF=parseFloat(b.kmF)||0, tkm=kmF>kmI?kmF-kmI:0;
  const fat=parseFloat(b.fat)||0, mb=parseFloat(b.mb)||0;
  const port=parseFloat(b.port)||0, comb=parseFloat(b.comb)||0;
  const dep=(b.exps||[]).filter(e=>e.category==="Depósito").reduce((s,e)=>s+(parseFloat(e.valor)||0),0);
  const outras=(b.exps||[]).filter(e=>e.category!=="Depósito").reduce((s,e)=>s+(parseFloat(e.valor)||0),0);
  const comB=fat*CR, ivaV=comB*IVA, com=comB+ivaV;
  const entr=fat-com-comb+port-outras-dep-mb;
  return {tkm,fat,mb,port,comb,outras,dep,comB,ivaV,com,entr,din:fat-mb};
}
function syncDOM() {
  const g=id=>{const e=document.getElementById(id);return e?e.value:"";};
  B.kmI=g("f_kmI");B.kmF=g("f_kmF");B.fat=g("f_fat");
  B.mb=g("f_mb");B.port=g("f_port");B.comb=g("f_comb");B.obs=g("f_obs");
}
function canSave() {
  const a=document.getElementById("f_kmI"),b=document.getElementById("f_kmF");
  const vi=a?a.value:(B.kmI||""),vf=b?b.value:(B.kmF||"");
  return vi.toString().trim()!==""&&parseFloat(vi)>0&&vf.toString().trim()!==""&&parseFloat(vf)>0;
}

async function apiGet(action,params={}) {
  const u=new URL(S.url);u.searchParams.set("action",action);
  for(const k in params)u.searchParams.set(k,params[k]);
  return (await fetch(u.toString())).json();
}
async function apiPost(body) {
  return (await fetch(S.url,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(body)})).json();
}
async function loadMonth(m) {
  if(S.loadedMonths[m])return;
  S.loading=true;S.err="";render();
  try {
    const d=await apiGet("getMonth",{month:m});
    if(d.error)throw new Error(d.error);
    (d.days||[]).forEach(r=>{S.records[r.date]={kmInicial:r.kmInicial,kmFinal:r.kmFinal,valorFaturado:r.valorFaturado,multibanco:r.multibanco,portagens:r.portagens,combustivel:r.combustivel,obs:r.obs||"",expenses:r.expenses||[]};});
    S.loadedMonths[m]=true;
  }catch(e){S.err="Erro: "+e.message;}
  S.loading=false;render();
}
function getPrevKm(date) {
  const dates=Object.keys(S.records).sort((a,b)=>a.localeCompare(b));
  const idx=dates.indexOf(date);
  if(idx>0)return parseFloat(getDay(dates[idx-1]).kmFinal)||0;
  const prev=new Date(date);prev.setDate(prev.getDate()-1);
  return parseFloat((S.records[prev.toISOString().split("T")[0]]||{}).kmFinal)||0;
}
function initBuf(date) {
  const day=getDay(date),buf=newBuf(day);
  if((!buf.kmI||parseFloat(buf.kmI)===0)&&!day.kmInicial){
    const p=getPrevKm(date);if(p>0)buf.kmI=p.toString();
  }
  return buf;
}
async function saveDay() {
  syncDOM();
  const date=S.date;
  S.records[date]={kmInicial:B.kmI,kmFinal:B.kmF,valorFaturado:B.fat,multibanco:B.mb,portagens:B.port,combustivel:B.comb,obs:B.obs,expenses:JSON.parse(JSON.stringify(B.exps))};
  S.syncing=true;S.err="";updateStatus();
  try {
    const c=calc(B);
    const emailData={
      date,kmI:B.kmI,kmF:B.kmF,tkm:c.tkm,
      fat:eur(c.fat),din:eur(c.din),mb:eur(c.mb),
      comB:eur(c.comB),ivaV:eur(c.ivaV),com:eur(c.com),
      comb:eur(c.comb),port:eur(c.port),outras:eur(c.outras),dep:eur(c.dep),
      entr:eur(c.entr),obs:B.obs||""
    };
    await apiPost({action:"saveDay",data:date,day:{kmInicial:B.kmI,kmFinal:B.kmF,valorFaturado:B.fat,multibanco:B.mb,portagens:B.port,combustivel:B.comb,obs:B.obs,expenses:B.exps},emailData});
    S.saved=true;S.syncing=false;updateStatus();
    setTimeout(()=>{S.saved=false;updateStatus();},2000);
    // Verificar se é o último dia do mês
    const [_y,_m,_d]=date.split("-").map(Number);
    const ultimoDia=new Date(_y,_m,0).getDate();
    if(_d===ultimoDia){
      await loadMonth(date.slice(0,7));
      enviarEmailMensal(date.slice(0,7));
    }
  }catch(e){S.err="Falha: "+e.message;S.syncing=false;updateStatus();}
}
async function deleteDayFn() {
  S.syncing=true;updateStatus();
  try {
    await apiPost({action:"deleteDay",data:S.date});
    delete S.records[S.date];B=newBuf();
  }catch(e){S.err="Falha: "+e.message;}
  S.syncing=false;S.deleteModal=false;render();
}

function h(tag,attrs,...kids) {
  const e=document.createElement(tag);
  for(const k in (attrs||{})){
    if(k==="style")Object.assign(e.style,attrs[k]);
    else if(k==="class")e.className=attrs[k];
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  }
  kids.flat().forEach(c=>{if(c!=null)e.append(c instanceof Node?c:document.createTextNode(String(c)));});
  return e;
}

async function enviarEmailMensal(mes) {
  try {
    const diasSemana=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
    const dias = Object.entries(S.records)
      .filter(([d]) => d.startsWith(mes))
      .sort((a,b) => a[0].localeCompare(b[0]))
      .map(([date, r]) => {
        const b2={kmI:r.kmInicial,kmF:r.kmFinal,fat:r.valorFaturado,mb:r.multibanco,port:r.portagens,comb:r.combustivel,obs:r.obs,exps:r.expenses||[]};

        return (parseFloat(r.valorFaturado)||0)>0 ? {
          data: dd+"/"+mes.slice(5),
          fat: eur(c2.fat), com: eur(c2.com), tkm: c2.tkm, entr: eur(c2.entr)
        } : null;
      }).filter(Boolean);

    let diasTrab=0,totKm=0,totFat=0,totComb=0,totPort=0,totOutras=0,totCom=0,totEntr=0;
    Object.entries(S.records).filter(([d])=>d.startsWith(mes)).forEach(([,r])=>{
      if((parseFloat(r.valorFaturado)||0)>0){

      }
    });

    };
    await apiPost({action:"sendEmailMensal", emailData});
    console.log("Email mensal enviado");
  } catch(e) {
    console.warn("Erro ao enviar email mensal:", e);
  }
}


// --- GEOLINK INTEGRAÇÃO ---
const GEOLINK_COMPANY = "b99cbe6e-5974-4d45-8977-7893a69b26ae";
const GEOLINK_TOKEN   = "27bda84a-7ec3-47b1-8135-9c84d3ce0d4f";

async function importarGeolink() {
  const btn = document.getElementById("btn-geolink");
  try {
    if(btn){ btn.textContent="⏳"; btn.disabled=true; }

    const now = new Date();
    const tz = "Europe/Lisbon";
    const startOfDay = new Date(now.toLocaleDateString("en-CA", {timeZone:tz}) + "T00:00:00");
    const endOfDay   = new Date(now.toLocaleDateString("en-CA", {timeZone:tz}) + "T23:59:59");
    const startTs = Math.floor(startOfDay.getTime() / 1000);
    const endTs   = Math.floor(endOfDay.getTime() / 1000);

    const form = new FormData();
    form.append("company_id", GEOLINK_COMPANY);
    form.append("start_ts", startTs);
    form.append("end_ts", endTs);
    form.append("min_limit", 0);
    form.append("max_limit", 100);
    form.append("ordered_list", JSON.stringify(["-system_entry_date"]));
    form.append("filter_type", "AND");

    const resp = await fetch("https://tlbilling.pt/api/company/cash_flow_filtered", {
      method: "POST",
      headers: { "x-forwarded-for": GEOLINK_TOKEN },
      body: form
    });
    const data = await resp.json();

    if(data.type === "success" && data.msg && data.msg.invoice_value !== undefined) {
      const total = Math.round(data.msg.invoice_value * 100) / 100;
      B.fat = total.toString();
      const inp = document.getElementById("f_fat");
      if(inp){ inp.value = total; }
      updateCalc(); updateStatus();
      if(btn){ btn.textContent="✅"; btn.disabled=false; setTimeout(()=>{ btn.textContent="🔄 Geolink"; }, 2000); }
    } else {
      if(btn){ btn.textContent="❌"; btn.disabled=false; setTimeout(()=>{ btn.textContent="🔄 Geolink"; }, 2000); }
      S.err = "Erro ao importar do Geolink"; updateStatus();
    }
  } catch(e) {
    if(btn){ btn.textContent="❌"; btn.disabled=false; setTimeout(()=>{ btn.textContent="🔄 Geolink"; }, 2000); }
    S.err = "Erro de ligação ao Geolink"; updateStatus();
  }
}

// --- IMPRESSÃO 57mm (Bluetooth ESC/POS, com fallback para impressão do sistema) ---
const PRINT_BT_SERVICES = [
  "000018f0-0000-1000-8000-00805f9b34fb",
  "0000ff00-0000-1000-8000-00805f9b34fb",
  "49535343-fe7d-4ae5-8fa9-9fafd205e455",
  "6e400001-b5a3-f393-e0a9-e50e24dcca9e",
  "0000fee7-0000-1000-8000-00805f9b34fb"
];
const BT_ID_KEY = "fsd_bt_printer_id";
let BT_DEVICE_CACHE = null, BT_CHAR_CACHE = null;

function stripAcentos_(s) {
  const map = {"á":"a","à":"a","â":"a","ã":"a","ä":"a","é":"e","è":"e","ê":"e","ë":"e","í":"i","ì":"i","î":"i","ï":"i","ó":"o","ò":"o","ô":"o","õ":"o","ö":"o","ú":"u","ù":"u","û":"u","ü":"u","ç":"c","ñ":"n","Á":"A","À":"A","Â":"A","Ã":"A","É":"E","Ê":"E","Í":"I","Ó":"O","Ô":"O","Õ":"O","Ú":"U","Ç":"C"};
  return String(s==null?"":s).replace(/[áàâãäéèêëíìîïóòôõöúùûüçñÁÀÂÃÉÊÍÓÔÕÚÇ]/g, ch => map[ch] || ch);
}
function padLine_(label, value, width) {
  width = width || 32;
  label = String(label); value = String(value);
  const sp = Math.max(1, width - label.length - value.length);
  return label + " ".repeat(sp) + value;
}
function buildReceiptLines(date, b, c) {
  // Cada linha é texto simples {t} OU um par {label,value} — cada formato
  // (HTML/sistema vs ESC/POS) trata o alinhamento à sua maneira.
  const L = [];
  L.push({t:"FOLHA DE SERVIÇO", align:"center", bold:true, big:true});
  L.push({t:date, align:"center"});
  L.push({sep:true});
  L.push({label:"KM Inicial:", value:String(b.kmI||"0")});
  L.push({label:"KM Final:", value:String(b.kmF||"0")});
  L.push({label:"Total Percorrido:", value:fkm(c.tkm)});
  L.push({sep:true});
  L.push({label:"Faturado:", value:eur(c.fat)});
  L.push({label:"Multibanco:", value:eur(c.mb)});
  L.push({label:"Dinheiro:", value:eur(c.din)});
  L.push({sep:true});
  L.push({label:"Comissão (40%):", value:eur(c.comB)});
  L.push({label:"IVA (23%):", value:eur(c.ivaV)});
  L.push({label:"Total Comissão:", value:eur(c.com), bold:true});
  L.push({sep:true});
  L.push({label:"Combustível:", value:eur(c.comb)});
  if(c.port>0) L.push({label:"Portagens:", value:eur(c.port)});
  (b.exps||[]).forEach(e=>{
    const val=parseFloat(e.valor)||0;
    if(val>0) L.push({label:e.category+":", value:eur(val)});
  });
  L.push({sep:true});
  L.push({label:"ENTREGAR:", value:eur(c.entr), bold:true, big:true});
  if(b.obs) { L.push({sep:true}); L.push({t:"Obs: "+b.obs}); }
  L.push({blank:true});
  L.push({t:"MJE Unip. Lda", align:"center"});
  L.push({t:"Impresso "+new Date().toLocaleString('pt-PT'), align:"center", small:true});
  return L;
}
function renderReceiptHTML(lines) {
  const el = document.getElementById("print-receipt");
  el.innerHTML = "";
  el.style.fontFamily = "monospace";
  lines.forEach(l=>{
    if(l.sep){ el.append(h("div",{style:{borderTop:"1px dashed #000",margin:"4px 0"}})); return; }
    if(l.blank){ el.append(h("div",{style:{height:"8px"}})); return; }
    const fontWeight=l.bold?"800":"400", fontSize=l.big?"15px":(l.small?"9px":"11px");
    if(l.label!=null){
      el.append(h("div",{style:{display:"flex",justifyContent:"space-between",gap:"6px",fontWeight,fontSize,marginBottom:"2px"}},
        h("span",{},l.label), h("span",{},l.value)
      ));
      return;
    }
    el.append(h("div",{style:{
      textAlign:l.align||"left", fontWeight, fontSize, whiteSpace:"pre-wrap", marginBottom:"2px"
    }}, l.t));
  });
}
function imprimirViaSistema(lines) {
  renderReceiptHTML(lines);
  setTimeout(()=>{ window.print(); }, 50);
}
function escSafeText_(s) {
  // A maioria das impressoras térmicas baratas não suporta UTF-8 nem o
  // símbolo €, por isso simplificamos para ASCII puro só neste caminho.
  return stripAcentos_(String(s==null?"":s)).replace(/€/g, "EUR ");
}
function buildEscPos_(lines) {
  const bytes = [];
  const push = (...b)=>b.forEach(x=>bytes.push(x));
  push(0x1B,0x40);
  lines.forEach(l=>{
    if(l.sep){ push(0x1B,0x61,0x00); const s="-".repeat(32)+"\n"; for(const ch of s) push(ch.charCodeAt(0)); return; }
    if(l.blank){ push(0x0A); return; }
    const align = l.align==="center"?0x01:(l.align==="right"?0x02:0x00);
    push(0x1B,0x61,align);
    push(0x1B,0x45,l.bold?1:0);
    push(0x1D,0x21,l.big?0x11:0x00);
    const txt = (l.label!=null ? padLine_(escSafeText_(l.label), escSafeText_(l.value)) : escSafeText_(l.t))+"\n";
    for(const ch of txt) push(ch.charCodeAt(0) & 0xFF);
    push(0x1D,0x21,0x00);
    push(0x1B,0x45,0);
  });
  push(0x0A,0x0A,0x0A,0x0A);
  return new Uint8Array(bytes);
}
async function findWritableChar_(device) {
  const server = await device.gatt.connect();
  const services = await server.getPrimaryServices();
  const tried = [];
  for(const svc of services) {
    const chars = await svc.getCharacteristics();
    for(const ch of chars) {
      tried.push(svc.uuid+" / "+ch.uuid);
      if(ch.properties.write || ch.properties.writeWithoutResponse) return ch;
    }
  }
  console.warn("Impressão BT: nenhuma característica de escrita encontrada. Serviços vistos:", tried);
  S.err = "Impressora Bluetooth ligada mas sem canal de escrita conhecido.";
  throw new Error("Sem característica de escrita");
}
async function writeInChunks_(char, bytes) {
  const CHUNK = 180;
  for(let i=0;i<bytes.length;i+=CHUNK){
    const slice = bytes.slice(i,i+CHUNK);
    if(char.properties.writeWithoutResponse) await char.writeValueWithoutResponse(slice);
    else await char.writeValue(slice);
    await new Promise(r=>setTimeout(r,30));
  }
}
async function imprimirViaBluetooth(lines) {
  let char = (BT_CHAR_CACHE && BT_DEVICE_CACHE && BT_DEVICE_CACHE.gatt.connected) ? BT_CHAR_CACHE : null;
  if(!char) {
    let device = BT_DEVICE_CACHE;
    if(!device) {
      const savedId = localStorage.getItem(BT_ID_KEY);
      if(savedId && navigator.bluetooth.getDevices) {
        try {
          const known = await navigator.bluetooth.getDevices();
          device = known.find(d=>d.id===savedId) || null;
        } catch(e){ device = null; }
      }
    }
    if(!device) {
      device = await navigator.bluetooth.requestDevice({ acceptAllDevices:true, optionalServices: PRINT_BT_SERVICES });
      try{ localStorage.setItem(BT_ID_KEY, device.id); }catch(e){}
    }
    char = await findWritableChar_(device);
    BT_DEVICE_CACHE = device; BT_CHAR_CACHE = char;
  }
  await writeInChunks_(char, buildEscPos_(lines));
}
async function imprimirRecibo() {
  const btn = document.getElementById("btn-print");
  syncDOM();
  const c = calc(B);
  if((parseFloat(B.kmI)||0)<=0 || (parseFloat(B.kmF)||0)<=0) {
    S.err = "Preenche os KMs antes de imprimir."; updateStatus(); return;
  }
  const lines = buildReceiptLines(S.date, B, c);
  if(btn){ btn.textContent="⏳"; btn.disabled=true; }
  try {
    if(navigator.bluetooth) {
      await imprimirViaBluetooth(lines);
      if(btn){ btn.textContent="✅"; setTimeout(()=>{btn.textContent="🖨️";btn.disabled=false;},2000); }
    } else {
      imprimirViaSistema(lines);
      if(btn){ btn.textContent="🖨️"; btn.disabled=false; }
    }
  } catch(e) {
    console.warn("Impressão Bluetooth falhou, a tentar impressão do sistema:", e);
    try {
      imprimirViaSistema(lines);
      if(btn){ btn.textContent="🖨️"; btn.disabled=false; }
    } catch(e2) {
      S.err = "Falha ao imprimir: "+e2.message; updateStatus();
      if(btn){ btn.textContent="❌"; setTimeout(()=>{btn.textContent="🖨️";btn.disabled=false;},2000); }
    }
  }
}

// --- LOGIN ---
const LOGIN_KEY = "fsd_auth";
const LOGIN_PW = "cr4";
function sessaoValida(){
  try{
    const s=JSON.parse(localStorage.getItem(LOGIN_KEY)||"null");
    if(!s||s.pw!==LOGIN_PW)return false;
    if(s.expiry&&Date.now()>s.expiry){localStorage.removeItem(LOGIN_KEY);return false;}
    return true;
  }catch(e){return false;}
}
function mostrarApp(){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="";
  render();
  loadMonth(S.date.slice(0,7)).then(()=>{B=initBuf(S.date);render();});
}
function tentarLogin(){
  const pw=document.getElementById("login-input").value;
  const err=document.getElementById("login-err");
  if(pw===LOGIN_PW){
    const lembrar=document.getElementById("login-lembrar").checked;
    if(lembrar){
      localStorage.setItem(LOGIN_KEY,JSON.stringify({pw:LOGIN_PW,expiry:Date.now()+7*24*60*60*1000}));
    }
    mostrarApp();
  } else {
    err.textContent="Password incorreta. Tenta novamente.";
    document.getElementById("login-input").value="";
    document.getElementById("login-input").focus();
  }
}
document.addEventListener("DOMContentLoaded",()=>{
  const inp=document.getElementById("login-input");
  if(inp)inp.addEventListener("keydown",e=>{if(e.key==="Enter")tentarLogin();});
  if(sessaoValida()){mostrarApp();}
});
