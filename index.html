<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folha de Serviço Diário - Táxi</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #111; color: #fff; }
  #app { max-width: 420px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; position: relative; }
  input { font-family: inherit; }
  ::placeholder { color: #555; }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fadein { animation: fadein .2s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="app"></div>

<script>
const COMMISSION_RATE = 0.40;
const IVA_RATE = 0.23;
const EXPENSE_CATEGORIES = ["Depósito", "Extintor", "Inspeção", "Lavagem", "Oficina", "Outros"];

// ── ESTADO GLOBAL ──
let state = {
  backendUrl: "",
  configured: false,
  loading: false,
  syncing: false,
  syncError: "",
  records: {}, // key: "yyyy-MM-dd" -> {kmInicial, kmFinal, valorFaturado, multibanco, portagens, combustivel, obs, expenses:[{category,valor,desc}]}
  tab: 0,
  date: todayStr(),
  reportMonth: todayStr().slice(0,7),
  loadedMonths: {}, // cache: "yyyy-MM" -> true
  expModal: false,
  deleteModal: false,
  editExpIndex: null,
  expForm: { category: EXPENSE_CATEGORIES[0], desc: "", valor: "" },
};

function todayStr() { return new Date().toISOString().split("T")[0]; }
function formatEur(v) { return "€" + Number(v||0).toFixed(2); }
function formatKm(v) { return Number(v||0).toFixed(0) + " km"; }
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const k in (attrs||{})) {
    if (k === "style") Object.assign(e.style, attrs[k]);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k === "html") e.innerHTML = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  children.flat().forEach(c => { if (c !== null && c !== undefined) e.append(c.nodeType ? c : document.createTextNode(c)); });
  return e;
}

function setState(patch) { Object.assign(state, patch); render(); }
function getDay(d) { return state.records[d] || { kmInicial:"", kmFinal:"", valorFaturado:"", multibanco:"", portagens:"", combustivel:"", obs:"", expenses:[] }; }

// ── BACKEND CALLS ──
async function apiGet(action, params={}) {
  const url = new URL(state.backendUrl);
  url.searchParams.set("action", action);
  for (const k in params) url.searchParams.set(k, params[k]);
  const res = await fetch(url.toString());
  return res.json();
}
async function apiPost(body) {
  const res = await fetch(state.backendUrl, {
    method: "POST",
    headers: { "Content-Type": "text/plain" }, // evita preflight CORS no Apps Script
    body: JSON.stringify(body),
  });
  return res.json();
}

async function loadMonth(monthStr) {
  if (state.loadedMonths[monthStr]) return;
  setState({ loading: true, syncError: "" });
  try {
    const data = await apiGet("getMonth", { month: monthStr });
    if (data.error) throw new Error(data.error);
    const records = { ...state.records };
    (data.days || []).forEach(d => {
      records[d.date] = {
        kmInicial: d.kmInicial, kmFinal: d.kmFinal, valorFaturado: d.valorFaturado,
        multibanco: d.multibanco, portagens: d.portagens, combustivel: d.combustivel,
        obs: d.obs || "", expenses: d.expenses || []
      };
    });
    setState({ records, loading:false, loadedMonths: { ...state.loadedMonths, [monthStr]: true } });
  } catch (err) {
    setState({ loading:false, syncError: "Erro ao ligar ao Google Sheets: " + err.message });
  }
}

async function loadAllMonths() {
  setState({ loading: true, syncError: "" });
  try {
    const data = await apiGet("getAll");
    if (data.error) throw new Error(data.error);
    const records = {};
    (data.days || []).forEach(d => {
      records[d.date] = {
        kmInicial: d.kmInicial, kmFinal: d.kmFinal, valorFaturado: d.valorFaturado,
        multibanco: d.multibanco, portagens: d.portagens, combustivel: d.combustivel,
        obs: d.obs || "", expenses: d.expenses || []
      };
    });
    setState({ records, loading:false });
  } catch (err) {
    setState({ loading:false, syncError: "Erro ao ligar ao Google Sheets: " + err.message });
  }
}

async function saveDayToSheet(date, day) {
  setState({ syncing: true });
  try {
    await apiPost({ action:"saveDay", data:date, day:{
      kmInicial: day.kmInicial, kmFinal: day.kmFinal, valorFaturado: day.valorFaturado,
      multibanco: day.multibanco, portagens: day.portagens, combustivel: day.combustivel,
      obs: day.obs, expenses: day.expenses
    }});
    setState({ syncing:false, syncError:"" });
  } catch (err) {
    setState({ syncing:false, syncError: "Falha ao guardar: " + err.message });
  }
}

async function deleteDayFromSheet(date) {
  setState({ syncing: true });
  try {
    await apiPost({ action:"deleteDay", data:date });
    setState({ syncing:false });
  } catch (err) {
    setState({ syncing:false, syncError: "Falha ao apagar: " + err.message });
  }
}

// ── HANDLERS ──
function updateDayLocal(date, patch) {
  const updated = { ...state.records };
  updated[date] = { ...getDay(date), ...patch };
  setState({ records: updated });
}

function updateDayDebounced(date, patch) {
  updateDayLocal(date, patch);
}

async function confirmDeleteDay() {
  const date = state.date;
  await deleteDayFromSheet(date);
  const updated = { ...state.records };
  delete updated[date];
  setState({ records: updated, deleteModal: false });
}

async function submitExpense() {
  if (!state.expForm.valor) return;
  const date = state.date;
  const day = getDay(date);
  const exps = [...(day.expenses||[])];

  if (state.editExpIndex !== null) {
    exps[state.editExpIndex] = { ...state.expForm };
  } else {
    exps.push({ ...state.expForm });
  }
  updateDayLocal(date, { expenses: exps });
  setState({ expModal: false, expForm: { category: EXPENSE_CATEGORIES[0], desc:"", valor:"" }, editExpIndex: null });
  await saveDayToSheet(date, getDay(date));
}

async function removeExpense(idx) {
  const date = state.date;
  const exps = [...(getDay(date).expenses||[])];
  exps.splice(idx, 1);
  updateDayLocal(date, { expenses: exps });
  await saveDayToSheet(date, getDay(date));
}

// ── CÁLCULOS DO DIA ──
function computeDay(day) {
  const kmInicial = parseFloat(day.kmInicial)||0, kmFinal = parseFloat(day.kmFinal)||0;
  const totalKm = kmFinal > kmInicial ? kmFinal - kmInicial : 0;
  const valorFaturado = parseFloat(day.valorFaturado)||0;
  const multibanco = parseFloat(day.multibanco)||0;
  const portagens = parseFloat(day.portagens)||0;
  const combustivel = parseFloat(day.combustivel)||0;
  const dinheiro = valorFaturado - multibanco;
  const totalOutrasDespesas = (day.expenses||[]).reduce((s,e)=>s+(parseFloat(e.valor)||0),0);
  const totalDespesas = combustivel + portagens + totalOutrasDespesas;
  const comissaoBase = valorFaturado * COMMISSION_RATE;
  const iva = comissaoBase * IVA_RATE;
  const comissaoComIva = comissaoBase + iva;
  const entregar = valorFaturado - comissaoComIva - combustivel + portagens - totalOutrasDespesas - multibanco;
  return { totalKm, valorFaturado, multibanco, portagens, combustivel, dinheiro, totalOutrasDespesas, totalDespesas, comissaoBase, iva, comissaoComIva, entregar };
}

// ── RENDER: SETUP SCREEN ──
function renderSetup() {
  const root = el("div", { style: { padding: "24px", display:"flex", flexDirection:"column", justifyContent:"center", minHeight:"100vh" } });
  root.append(
    el("div", { style: { textAlign:"center", marginBottom: 32 } },
      el("div", { style: { fontSize: 48, marginBottom: 8 } }, "🚕"),
      el("div", { style: { fontWeight:800, fontSize: 20, color:"#facc15" } }, "Folha de Serviço"),
      el("div", { style: { fontSize: 13, color:"#888", marginTop: 4 } }, "Liga à tua Google Sheet")
    ),
    el("div", { style: { marginBottom: 20 } },
      el("span", { style: { fontSize:12, color:"#888", display:"block", marginBottom:6 } }, "URL do Backend (Google Apps Script)"),
      el("input", {
        placeholder: "https://script.google.com/macros/s/.../exec",
        value: state.backendUrl,
        style: { width:"100%", background:"#1e1e1e", border:"1px solid #444", color:"#fff", borderRadius:10, padding:"12px 14px", fontSize:13 },
        oninput: e => { state.backendUrl = e.target.value; }
      })
    ),
    state.syncError ? el("div", { style: { background:"#2e1a1a", border:"1px solid #f8717155", borderRadius:10, padding:"10px 14px", fontSize:12, color:"#f87171", marginBottom:16 } }, state.syncError) : null,
    el("button", {
      style: { width:"100%", background:"#facc15", color:"#111", border:"none", borderRadius:12, padding:"14px", fontWeight:800, fontSize:15, cursor:"pointer" },
      onclick: async () => {
        if (!state.backendUrl.trim()) { setState({ syncError: "Preenche o URL do backend." }); return; }
        setState({ configured: true });
        await loadMonth(state.date.slice(0,7));
      }
    }, "Entrar"),
    el("div", { style: { fontSize: 11, color:"#555", marginTop: 20, lineHeight: 1.6, textAlign:"center" } },
      "Os dados ficam guardados diretamente na tua Google Sheet, organizados por mês.")
  );
  return root;
}

// ── RENDER: HEADER + NAV ──
function renderHeader() {
  const tabs = ["Hoje", "Histórico", "Relatório", "Resumo"];
  const header = el("div", { style: { background:"#1a1a1a", padding:"16px 16px 0", borderBottom:"1px solid #333", position:"sticky", top:0, zIndex:10 } });
  const topRow = el("div", { style: { display:"flex", alignItems:"center", gap:10, marginBottom:12 } },
    el("span", { style: { fontSize:28 } }, "🚕"),
    el("div", { style: { flex:1 } },
      el("div", { style: { fontWeight:700, fontSize:17, color:"#facc15" } }, "Folha de Serviço"),
      el("div", { style: { fontSize:11, color:"#888" } }, "Registo Diário de Táxi")
    )
  );
  if (state.syncing) {
    const s = el("span", { style:{ fontSize:16 } }, "🔄"); s.className="spin"; topRow.append(s);
  } else {
    topRow.append(el("button", { style: { background:"none", border:"none", color:"#666", fontSize:11, cursor:"pointer" }, onclick: () => setState({ configured:false }) }, "Sair"));
  }
  header.append(topRow);

  const navRow = el("div", { style: { display:"flex" } });
  tabs.forEach((t,i) => {
    navRow.append(el("button", {
      style: { flex:1, padding:"10px 0", fontSize:13, fontWeight:600, background:"none", border:"none", cursor:"pointer",
        color: state.tab===i ? "#facc15" : "#888", borderBottom: state.tab===i ? "2px solid #facc15" : "2px solid transparent" },
      onclick: () => setState({ tab:i })
    }, t));
  });
  header.append(navRow);
  return header;
}

// ── RENDER: TAB HOJE ──
function renderHoje() {
  const date = state.date;
  const day = getDay(date);
  const c = computeDay(day);

  const wrap = el("div", { class:"fadein" });

  const dateRow = el("div", { style:{ display:"flex", alignItems:"center", gap:8, marginBottom:16 } },
    el("span", { style:{ fontSize:13, color:"#aaa" } }, "📅 Data:"),
    el("input", { type:"date", value:date, style:{ background:"#222", border:"1px solid #444", color:"#fff", borderRadius:8, padding:"4px 10px", fontSize:13 },
      onchange: async e => { const newDate = e.target.value; setState({ date:newDate }); await loadMonth(newDate.slice(0,7)); } })
  );
  if (state.records[date]) {
    dateRow.append(el("button", { style:{ marginLeft:"auto", background:"#7f1d1d", border:"none", borderRadius:8, padding:"5px 12px", color:"#fca5a5", fontSize:12, fontWeight:700, cursor:"pointer" },
      onclick: ()=>setState({ deleteModal:true }) }, "🗑️ Apagar Dia"));
  }
  wrap.append(dateRow);

  // KM card
  wrap.append(el("div", { style:{ background:"#1e1e1e", borderRadius:12, padding:16, marginBottom:12 } },
    el("div", { style:{ fontWeight:700, marginBottom:12, color:"#facc15", fontSize:14 } }, "📍 Quilómetros"),
    el("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 } },
      el("div", {},
        el("span", { style:{ fontSize:11, color:"#888", display:"block", marginBottom:4 } }, "KM Inicial"),
        el("input", { type:"number", placeholder:"0", value:day.kmInicial,
          style:{ background:"#2a2a2a", color:"#fff", border:"1px solid #444", borderRadius:8, padding:"8px 12px", width:"100%", fontSize:15 },
          oninput: e => updateDayDebounced(date, { kmInicial: e.target.value }) })
      ),
      el("div", {},
        el("span", { style:{ fontSize:11, color:"#888", display:"block", marginBottom:4 } }, "KM Final"),
        el("input", { type:"number", placeholder:"0", value:day.kmFinal,
          style:{ background:"#2a2a2a", color:"#fff", border:"1px solid #444", borderRadius:8, padding:"8px 12px", width:"100%", fontSize:15 },
          oninput: e => updateDayDebounced(date, { kmFinal: e.target.value }) })
      )
    ),
    el("div", { style:{ background:"#facc1520", borderRadius:8, padding:"10px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" } },
      el("span", { style:{ color:"#aaa", fontSize:13 } }, "Total do Dia"),
      el("span", { style:{ color:"#facc15", fontWeight:800, fontSize:20 } }, formatKm(c.totalKm))
    )
  ));

  // Faturação card
  wrap.append(el("div", { style:{ background:"#1e1e1e", borderRadius:12, padding:16, marginBottom:12 } },
    el("div", { style:{ fontWeight:700, marginBottom:12, color:"#4ade80", fontSize:14 } }, "💶 Faturação"),
    el("div", { style:{ marginBottom:10 } },
      el("span", { style:{ fontSize:11, color:"#888", display:"block", marginBottom:4 } }, "Valor Total Faturado (€)"),
      el("input", { type:"number", placeholder:"0.00", value:day.valorFaturado,
        style:{ background:"#2a2a2a", color:"#fff", border:"1px solid #444", borderRadius:8, padding:"8px 12px", width:"100%", fontSize:15 },
        oninput: e => updateDayDebounced(date, { valorFaturado: e.target.value }) })
    ),
    el("div", { style:{ marginBottom:10 } },
      el("span", { style:{ fontSize:11, color:"#888", display:"block", marginBottom:4 } }, "Recebido em Multibanco (€)"),
      el("input", { type:"number", placeholder:"0.00", value:day.multibanco,
        style:{ background:"#2a2a2a", color:"#fff", border:"1px solid #444", borderRadius:8, padding:"8px 12px", width:"100%", fontSize:15 },
        oninput: e => updateDayDebounced(date, { multibanco: e.target.value }) })
    ),
    el("div", { style:{ background:"#1a2e1a", borderRadius:8, padding:"10px 14px", display:"flex", justifyContent:"space-between" } },
      el("span", { style:{ color:"#aaa", fontSize:13 } }, "Recebido em Dinheiro"),
      el("span", { style:{ color:"#4ade80", fontWeight:700, fontSize:16 } }, formatEur(c.dinheiro))
    )
  ));

  // Combustível + Portagens card
  wrap.append(el("div", { style:{ background:"#1e1e1e", borderRadius:12, padding:16, marginBottom:12 } },
    el("div", { style:{ fontWeight:700, marginBottom:12, color:"#fb923c", fontSize:14 } }, "⛽ Combustível & Portagens"),
    el("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 } },
      el("div", {},
        el("span", { style:{ fontSize:11, color:"#888", display:"block", marginBottom:4 } }, "Combustível (€)"),
        el("input", { type:"number", placeholder:"0.00", value:day.combustivel,
          style:{ background:"#2a2a2a", color:"#fff", border:"1px solid #444", borderRadius:8, padding:"8px 12px", width:"100%", fontSize:15 },
          oninput: e => updateDayDebounced(date, { combustivel: e.target.value }) })
      ),
      el("div", {},
        el("span", { style:{ fontSize:11, color:"#888", display:"block", marginBottom:4 } }, "Portagens (€)"),
        el("input", { type:"number", placeholder:"0.00", value:day.portagens,
          style:{ background:"#2a2a2a", color:"#fff", border:"1px solid #444", borderRadius:8, padding:"8px 12px", width:"100%", fontSize:15 },
          oninput: e => updateDayDebounced(date, { portagens: e.target.value }) })
      )
    )
  ));

  // Outras Despesas card
  const despHeader = el("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 } },
    el("div", { style:{ fontWeight:700, color:"#f87171", fontSize:14 } }, "🧾 Outras Despesas"),
    el("button", { style:{ background:"#f87171", color:"#fff", border:"none", borderRadius:8, padding:"5px 12px", fontSize:12, fontWeight:700, cursor:"pointer" },
      onclick: () => setState({ expModal:true, editExpIndex:null, expForm:{ category:EXPENSE_CATEGORIES[0], desc:"", valor:"" } }) }, "+ Adicionar")
  );
  const despCard = el("div", { style:{ background:"#1e1e1e", borderRadius:12, padding:16, marginBottom:12 } }, despHeader);
  const exps = day.expenses||[];
  if (exps.length===0) despCard.append(el("div", { style:{ textAlign:"center", color:"#555", fontSize:13, padding:"12px 0" } }, "Sem despesas extra registadas"));
  exps.forEach((e,idx) => {
    despCard.append(el("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", background:"#2a2a2a", borderRadius:8, padding:"8px 12px", marginBottom:6 } },
      el("div", {},
        el("div", { style:{ fontSize:13, fontWeight:600 } }, e.category),
        e.desc ? el("div", { style:{ fontSize:11, color:"#888" } }, e.desc) : null
      ),
      el("div", { style:{ display:"flex", alignItems:"center", gap:8 } },
        el("span", { style:{ color:"#f87171", fontWeight:700 } }, formatEur(e.valor)),
        el("button", { style:{ background:"none", border:"none", cursor:"pointer", fontSize:14 },
          onclick: ()=> setState({ expModal:true, editExpIndex:idx, expForm:{ category:e.category, desc:e.desc||"", valor:e.valor } }) }, "✏️"),
        el("button", { style:{ background:"none", border:"none", cursor:"pointer", fontSize:14 }, onclick: ()=>removeExpense(idx) }, "🗑️")
      )
    ));
  });
  if (exps.length>0) {
    despCard.append(el("div", { style:{ background:"#2e1a1a", borderRadius:8, padding:"8px 12px", display:"flex", justifyContent:"space-between", marginTop:6 } },
      el("span", { style:{ color:"#aaa", fontSize:13 } }, "Total Outras Despesas"),
      el("span", { style:{ color:"#f87171", fontWeight:700 } }, formatEur(c.totalOutrasDespesas))
    ));
  }
  wrap.append(despCard);

  // Observações
  wrap.append(el("div", { style:{ background:"#1e1e1e", borderRadius:12, padding:16, marginBottom:12 } },
    el("div", { style:{ fontWeight:700, marginBottom:10, color:"#94a3b8", fontSize:14 } }, "📝 Observações"),
    el("input", { placeholder:"Notas sobre o dia (opcional)", value:day.obs||"",
      style:{ background:"#2a2a2a", color:"#fff", border:"1px solid #444", borderRadius:8, padding:"8px 12px", width:"100%", fontSize:14 },
      oninput: e => updateDayDebounced(date, { obs: e.target.value }) })
  ));

  // Comissão card
  wrap.append(el("div", { style:{ background:"#1e1e1e", borderRadius:12, padding:16, marginBottom:12 } },
    el("div", { style:{ fontWeight:700, marginBottom:12, color:"#c084fc", fontSize:14 } }, "📊 Comissão"),
    el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:6 } },
      el("span", { style:{ color:"#aaa" } }, `Base (40% de ${formatEur(c.valorFaturado)})`), el("span", {}, formatEur(c.comissaoBase))),
    el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:6 } },
      el("span", { style:{ color:"#aaa" } }, "IVA (23%)"), el("span", {}, formatEur(c.iva))),
    el("div", { style:{ height:1, background:"#333", margin:"4px 0" } }),
    el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:15, fontWeight:700 } },
      el("span", { style:{ color:"#c084fc" } }, "Total Comissão c/ IVA"), el("span", { style:{ color:"#c084fc" } }, formatEur(c.comissaoComIva)))
  ));

  // Resultado / Entregar
  wrap.append(el("div", { style:{ background:"linear-gradient(135deg, #1a2e1a, #1e1e1e)", border:"1px solid #4ade8044", borderRadius:12, padding:16 } },
    el("div", { style:{ fontWeight:700, marginBottom:12, color:"#4ade80", fontSize:14 } }, "✅ Valor a Entregar"),
    el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:6 } },
      el("span", { style:{ color:"#aaa" } }, "Faturado"), el("span", { style:{ color:"#4ade80" } }, "+ "+formatEur(c.valorFaturado))),
    el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:6 } },
      el("span", { style:{ color:"#aaa" } }, "Comissão c/ IVA"), el("span", { style:{ color:"#f87171" } }, "- "+formatEur(c.comissaoComIva))),
    el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:6 } },
      el("span", { style:{ color:"#aaa" } }, "Combustível"), el("span", { style:{ color:"#f87171" } }, "- "+formatEur(c.combustivel))),
    el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:6 } },
      el("span", { style:{ color:"#aaa" } }, "Portagens"), el("span", { style:{ color:"#f87171" } }, "- "+formatEur(c.portagens))),
    el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:6 } },
      el("span", { style:{ color:"#aaa" } }, "Outras Despesas"), el("span", { style:{ color:"#f87171" } }, "- "+formatEur(c.totalOutrasDespesas))),
    el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:10 } },
      el("span", { style:{ color:"#aaa" } }, "Multibanco"), el("span", { style:{ color:"#f87171" } }, "- "+formatEur(c.multibanco))),
    el("div", { style:{ background: c.entregar>=0?"#4ade8022":"#f8717122", borderRadius:10, padding:"12px 16px", display:"flex", justifyContent:"space-between", alignItems:"center" } },
      el("span", { style:{ fontWeight:700, fontSize:15 } }, "Entregar"),
      el("span", { style:{ fontWeight:800, fontSize:24, color: c.entregar>=0?"#4ade80":"#f87171" } }, formatEur(c.entregar))
    )
  ));

  return wrap;
}

// ── RENDER: TAB HISTÓRICO ──
function renderHistorico() {
  const wrap = el("div", { class:"fadein" });
  wrap.append(el("div", { style:{ fontWeight:700, fontSize:16, marginBottom:16, color:"#facc15" } }, "📋 Histórico de Dias"));
  const dates = Object.keys(state.records).sort((a,b)=>b.localeCompare(a));
  if (dates.length===0) { wrap.append(el("div", { style:{ textAlign:"center", color:"#555", padding:40 } }, "Nenhum registo carregado. Usa o Relatório para carregar um mês.")); return wrap; }
  dates.forEach(d => {
    const r = getDay(d);
    const c = computeDay(r);
    const isToday = d===todayStr();
    wrap.append(el("div", { style:{ background:"#1e1e1e", borderRadius:12, padding:14, marginBottom:10, cursor:"pointer", border: isToday?"1px solid #facc1566":"1px solid transparent" },
      onclick: ()=>setState({ date:d, tab:0 }) },
      el("div", { style:{ display:"flex", justifyContent:"space-between", marginBottom:8 } },
        el("div", { style:{ fontWeight:700, fontSize:14 } }, (isToday?"🟡 Hoje":"📅")+" "+d),
        el("div", { style:{ fontWeight:800, fontSize:16, color: c.entregar>=0?"#4ade80":"#f87171" } }, formatEur(c.entregar))
      ),
      el("div", { style:{ display:"flex", gap:12, fontSize:12, color:"#aaa", flexWrap:"wrap" } },
        el("span", {}, "🛣️ "+formatKm(c.totalKm)), el("span", {}, "💶 "+formatEur(c.valorFaturado)),
        el("span", {}, "📊 "+formatEur(c.comissaoComIva)), el("span", {}, "🧾 "+formatEur(c.totalDespesas))
      )
    ));
  });
  return wrap;
}

// ── RENDER: TAB RELATÓRIO ──
function renderRelatorio() {
  const wrap = el("div", { class:"fadein" });
  wrap.append(el("div", { style:{ fontWeight:700, fontSize:16, marginBottom:16, color:"#facc15" } }, "📈 Relatório Mensal"));
  wrap.append(el("div", { style:{ display:"flex", alignItems:"center", gap:8, marginBottom:16 } },
    el("span", { style:{ fontSize:13, color:"#aaa" } }, "Mês:"),
    el("input", { type:"month", value:state.reportMonth, style:{ background:"#222", border:"1px solid #444", color:"#fff", borderRadius:8, padding:"4px 10px", fontSize:13 },
      onchange: async e=>{ const m=e.target.value; setState({ reportMonth:m }); await loadMonth(m); } }),
    el("button", { style:{ marginLeft:"auto", background:"#333", border:"none", borderRadius:8, padding:"6px 12px", color:"#aaa", fontSize:11, cursor:"pointer" },
      onclick: async ()=>{ await loadMonth(state.reportMonth); } }, "🔄 Atualizar")
  ));
  const monthDates = Object.keys(state.records).filter(d=>d.startsWith(state.reportMonth));
  if (monthDates.length===0) { wrap.append(el("div", { style:{ textAlign:"center", color:"#555", padding:40 } }, "Sem registos carregados para este mês. Clica em Atualizar.")); return wrap; }
  const stats = monthDates.reduce((acc,d)=>{
    const c = computeDay(getDay(d));
    return { km:acc.km+c.totalKm, faturado:acc.faturado+c.valorFaturado, multibanco:acc.multibanco+c.multibanco, dinheiro:acc.dinheiro+c.dinheiro,
      despesas:acc.despesas+c.totalDespesas, comissao:acc.comissao+c.comissaoComIva, entregar:acc.entregar+c.entregar, dias:acc.dias+1 };
  }, { km:0,faturado:0,multibanco:0,dinheiro:0,despesas:0,comissao:0,entregar:0,dias:0 });

  const grid = el("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 } });
  [["Dias Trabalhados", stats.dias+" dias","#facc15"],["KM Totais",formatKm(stats.km),"#facc15"],
   ["Total Faturado",formatEur(stats.faturado),"#4ade80"],["Multibanco",formatEur(stats.multibanco),"#60a5fa"],
   ["Dinheiro",formatEur(stats.dinheiro),"#60a5fa"],["Total Despesas",formatEur(stats.despesas),"#f87171"],
   ["Total Comissões",formatEur(stats.comissao),"#c084fc"]].forEach(([l,v,c])=>{
    grid.append(el("div", { style:{ background:"#1e1e1e", borderRadius:10, padding:"12px 14px" } },
      el("div", { style:{ fontSize:11, color:"#666", marginBottom:4 } }, l),
      el("div", { style:{ fontWeight:700, fontSize:16, color:c } }, v)
    ));
  });
  wrap.append(grid);
  wrap.append(el("div", { style:{ background:"linear-gradient(135deg, #1a2e1a, #1e1e1e)", border:"1px solid #4ade8044", borderRadius:12, padding:16 } },
    el("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center" } },
      el("div", {},
        el("div", { style:{ fontSize:12, color:"#aaa", marginBottom:4 } }, "💰 Entregar do Mês"),
        el("div", { style:{ fontSize:11, color:"#555" } }, "Média: "+formatEur(stats.entregar/stats.dias)+" / dia")
      ),
      el("div", { style:{ fontWeight:800, fontSize:28, color: stats.entregar>=0?"#4ade80":"#f87171" } }, formatEur(stats.entregar))
    )
  ));
  return wrap;
}

// ── RENDER: TAB RESUMO ──
function renderResumo() {
  const wrap = el("div", { class:"fadein" });
  wrap.append(el("div", { style:{ fontWeight:700, fontSize:16, marginBottom:4, color:"#facc15" } }, "📊 Resumo Mensal"));
  wrap.append(el("div", { style:{ fontSize:12, color:"#666", marginBottom:16 } }, "Indicadores de performance"));
  wrap.append(el("div", { style:{ display:"flex", alignItems:"center", gap:8, marginBottom:20 } },
    el("span", { style:{ fontSize:13, color:"#aaa" } }, "Mês:"),
    el("input", { type:"month", value:state.reportMonth, style:{ background:"#222", border:"1px solid #444", color:"#fff", borderRadius:8, padding:"4px 10px", fontSize:13 },
      onchange: async e=>{ const m=e.target.value; setState({ reportMonth:m }); await loadMonth(m); } })
  ));

  const mDates = Object.keys(state.records).filter(d=>d.startsWith(state.reportMonth));
  if (mDates.length===0) { wrap.append(el("div", { style:{ textAlign:"center", color:"#555", padding:40 } }, "Sem registos carregados para este mês.")); return wrap; }

  const dayStats = mDates.map(d=>computeDay(getDay(d)));

  const totKm = dayStats.reduce((s,d)=>s+d.totalKm,0);
  const totVf = dayStats.reduce((s,d)=>s+d.valorFaturado,0);
  const totMb = dayStats.reduce((s,d)=>s+d.multibanco,0);
  const totDesp = dayStats.reduce((s,d)=>s+d.totalDespesas,0);
  const totComb = dayStats.reduce((s,d)=>s+d.combustivel,0);
  const totIva = dayStats.reduce((s,d)=>s+d.iva,0);
  const totComBase = dayStats.reduce((s,d)=>s+d.comissaoBase,0);
  const totComTotal = dayStats.reduce((s,d)=>s+d.comissaoComIva,0);
  const totEntregar = dayStats.reduce((s,d)=>s+d.entregar,0);
  const dias = dayStats.length;

  const mediaKmDia = dias>0 ? totKm/dias : 0;
  const mediaKmFatDia = dias>0 ? dayStats.reduce((s,d)=>s+(d.totalKm>0?d.valorFaturado/d.totalKm:0),0)/dias : 0;
  const mediaKmFatAcum = totKm>0 ? totVf/totKm : 0;
  const combPor100km = totKm>0 ? (totComb/totKm)*100 : 0;

  function kpi(icon, title, value, sub, color) {
    return el("div", { style:{ background:"#1e1e1e", borderRadius:12, padding:16, marginBottom:10, border:`1px solid ${color}33` } },
      el("div", { style:{ fontSize:11, color:"#777", marginBottom:6, display:"flex", alignItems:"center", gap:6 } }, icon+" "+title),
      el("div", { style:{ fontWeight:800, fontSize:22, color } }, value),
      sub ? el("div", { style:{ fontSize:11, color:"#666", marginTop:4 } }, sub) : null
    );
  }

  wrap.append(el("div", { style:{ fontSize:11, color:"#facc15", fontWeight:700, letterSpacing:1, marginBottom:8, textTransform:"uppercase" } }, "📍 Quilómetros"));
  wrap.append(kpi("🛣️", "Média de KM por Dia", mediaKmDia.toFixed(1)+" km", `Total: ${totKm.toFixed(0)} km em ${dias} dias`, "#facc15"));
  wrap.append(kpi("💶", "Faturado por KM — Dia (média)", "€"+mediaKmFatDia.toFixed(3)+"/km", "Média KM diário", "#60a5fa"));
  wrap.append(kpi("📈", "Faturado por KM — Acumulado", "€"+mediaKmFatAcum.toFixed(3)+"/km", "Média KM Mensal", "#60a5fa"));

  wrap.append(el("div", { style:{ fontSize:11, color:"#f87171", fontWeight:700, letterSpacing:1, margin:"16px 0 8px", textTransform:"uppercase" } }, "⛽ Combustível"));
  wrap.append(kpi("⛽", "Custo de Combustível por 100 km", formatEur(combPor100km)+"/100km", `${formatEur(totComb)} gastos · ${totKm.toFixed(0)} km percorridos`, "#f87171"));

  wrap.append(el("div", { style:{ fontSize:11, color:"#c084fc", fontWeight:700, letterSpacing:1, margin:"16px 0 8px", textTransform:"uppercase" } }, "📊 Comissão"));
  wrap.append(kpi("🧾", "Total IVA da Comissão do Motorista", formatEur(totIva), `Base: ${formatEur(totComBase)} · IVA (23%): ${formatEur(totIva)}`, "#c084fc"));

  // Calcular totais por categoria de outras despesas (Depósito trata-se como entrega, não despesa)
  const catTotals = {};
  let totDeposito = 0;
  mDates.forEach(d => {
    (getDay(d).expenses||[]).forEach(e => {
      const cat = e.category || "Outros";
      if (cat === "Depósito") {
        totDeposito += (parseFloat(e.valor)||0);
      } else {
        catTotals[cat] = (catTotals[cat] || 0) + (parseFloat(e.valor)||0);
      }
    });
  });
  const totPort = dayStats.reduce((s,d)=>s+d.portagens,0);
  const totCombRes = dayStats.reduce((s,d)=>s+d.combustivel,0);
  const totOutrasRes = Object.values(catTotals).reduce((s,v)=>s+v,0);
  const totEntregarReal = totVf - totComTotal - totCombRes + totPort - totOutrasRes - totDeposito - totMb;

  wrap.append(el("div", { style:{ fontSize:11, color:"#4ade80", fontWeight:700, letterSpacing:1, margin:"16px 0 8px", textTransform:"uppercase" } }, "💰 Valor a Entregar"));
  const devCard = el("div", { style:{ background: totEntregarReal>=0?"#1a2e1a":"#2e1a1a", border:`1px solid ${totEntregarReal>=0?"#4ade80":"#f87171"}55`, borderRadius:14, padding:18, marginBottom:10 } });

  const lines = el("div", { style:{ display:"flex", flexDirection:"column", gap:6, marginBottom:14 } });

  // Total Faturado
  lines.append(el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:13 } },
    el("span", { style:{ color:"#888" } }, "💶 Total Faturado"),
    el("span", { style:{ color:"#4ade80", fontWeight:600 } }, "+ "+formatEur(totVf))));

  // Comissão
  lines.append(el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:13 } },
    el("span", { style:{ color:"#888" } }, "📊 Comissão c/ IVA"),
    el("span", { style:{ color:"#c084fc", fontWeight:600 } }, "− "+formatEur(totComTotal))));

  // Combustível
  lines.append(el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:13 } },
    el("span", { style:{ color:"#888" } }, "⛽ Combustível"),
    el("span", { style:{ color:"#f87171", fontWeight:600 } }, "− "+formatEur(totCombRes))));

  // Multibanco
  lines.append(el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:13 } },
    el("span", { style:{ color:"#888" } }, "💳 Multibanco"),
    el("span", { style:{ color:"#60a5fa", fontWeight:600 } }, "− "+formatEur(totMb))));

  // Depósito (logo a seguir ao Multibanco — também é uma forma de entrega)
  if (totDeposito > 0) {
    lines.append(el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:13 } },
      el("span", { style:{ color:"#888" } }, "🏦 Depósito Bancário"),
      el("span", { style:{ color:"#60a5fa", fontWeight:600 } }, "− "+formatEur(totDeposito))));
  }

  // Outras despesas por categoria (sem Depósito)
  const catEntries = Object.entries(catTotals).filter(([cat]) => cat !== "Depósito").sort((a,b)=>b[1]-a[1]);
  if (catEntries.length > 0) {
    lines.append(el("div", { style:{ fontSize:11, color:"#666", margin:"6px 0 2px", fontWeight:600, textTransform:"uppercase", letterSpacing:0.5 } }, "🧾 Outras Despesas"));
    catEntries.forEach(([cat, val]) => {
      lines.append(el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:13, paddingLeft:12 } },
        el("span", { style:{ color:"#888" } }, "· "+cat),
        el("span", { style:{ color:"#f87171", fontWeight:600 } }, "− "+formatEur(val))));
    });
    if (catEntries.length > 1) {
      lines.append(el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:12, paddingLeft:12, marginTop:2 } },
        el("span", { style:{ color:"#666" } }, "Total outras despesas"),
        el("span", { style:{ color:"#f87171" } }, "− "+formatEur(totOutrasRes))));
    }
  }

  // Portagens (soma)
  lines.append(el("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:13, marginTop:4 } },
    el("span", { style:{ color:"#888" } }, "🛣️ Portagens (recebidas do cliente)"),
    el("span", { style:{ color:"#4ade80", fontWeight:600 } }, "+ "+formatEur(totPort))));

  devCard.append(lines);
  devCard.append(el("div", { style:{ height:1, background:"#333", marginBottom:14 } }));
  devCard.append(el("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center" } },
    el("span", { style:{ fontWeight:700, fontSize:14 } }, "Total a Entregar"),
    el("span", { style:{ fontWeight:800, fontSize:28, color: totEntregarReal>=0?"#4ade80":"#f87171" } }, formatEur(totEntregarReal))
  ));
  wrap.append(devCard);

  return wrap;
}

// ── RENDER: BOTTOM NAV ──
function renderBottomNav() {
  const nav = el("div", { style:{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:420, background:"#1a1a1a", borderTop:"1px solid #333", display:"flex", alignItems:"center", padding:"8px 16px", gap:12 } });

  if (state.tab === 0) {
    // No separador Hoje: botão Gravar ao centro
    nav.append(el("button", {
      style:{ flex:1, padding:"13px", background:"#facc15", border:"none", borderRadius:12, color:"#111", fontWeight:800, fontSize:15, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 },
      onclick: async () => {
        const date = state.date;
        const day = getDay(date);
        await saveDayToSheet(date, day);
        if (!state.syncError) {
          // feedback visual breve
          setState({ saveSuccess: true });
          setTimeout(() => setState({ saveSuccess: false }), 2000);
        }
      }
    }, state.saveSuccess ? "✅ Guardado!" : "💾 Gravar Dia"));
  } else {
    // Nos outros separadores: apenas um indicador discreto
    nav.append(el("div", { style:{ flex:1, textAlign:"center", fontSize:11, color:"#555" } }, 
      state.syncing ? "🔄 A sincronizar..." : ""));
  }

  return nav;
}

// ── RENDER: MODALS ──
function renderDeleteModal() {
  if (!state.deleteModal) return null;
  return el("div", { style:{ position:"fixed", inset:0, background:"#000b", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100, padding:24 },
      onclick: e=>{ if(e.target===e.currentTarget) setState({ deleteModal:false }); } },
    el("div", { style:{ background:"#1e1e1e", borderRadius:16, padding:24, width:"100%", maxWidth:360 } },
      el("div", { style:{ fontSize:36, textAlign:"center", marginBottom:12 } }, "🗑️"),
      el("div", { style:{ fontWeight:700, fontSize:17, textAlign:"center", marginBottom:8 } }, "Apagar Registo"),
      el("div", { style:{ fontSize:13, color:"#aaa", textAlign:"center", marginBottom:24 } }, `Tens a certeza que queres apagar o registo de ${state.date}? Esta ação não pode ser desfeita.`),
      el("div", { style:{ display:"flex", gap:10 } },
        el("button", { style:{ flex:1, padding:12, background:"#333", border:"none", borderRadius:10, color:"#aaa", fontWeight:700, cursor:"pointer" }, onclick:()=>setState({ deleteModal:false }) }, "Cancelar"),
        el("button", { style:{ flex:1, padding:12, background:"#dc2626", border:"none", borderRadius:10, color:"#fff", fontWeight:700, cursor:"pointer" }, onclick:confirmDeleteDay }, "Apagar")
      )
    )
  );
}

function renderExpModal() {
  if (!state.expModal) return null;
  return el("div", { style:{ position:"fixed", inset:0, background:"#000a", display:"flex", alignItems:"flex-end", zIndex:100 },
      onclick: e=>{ if(e.target===e.currentTarget) setState({ expModal:false }); } },
    el("div", { style:{ background:"#1e1e1e", borderRadius:"20px 20px 0 0", padding:24, width:"100%", maxWidth:420, margin:"0 auto" } },
      el("div", { style:{ fontWeight:700, fontSize:16, marginBottom:16, color:"#f87171" } }, state.editExpIndex!==null ? "✏️ Editar Despesa" : "➕ Nova Despesa"),
      el("div", { style:{ marginBottom:12 } },
        el("span", { style:{ fontSize:11, color:"#888", display:"block", marginBottom:6 } }, "Tipo"),
        el("div", { style:{ display:"flex", flexWrap:"wrap", gap:6 } }, EXPENSE_CATEGORIES.map(c=>
          el("button", { style:{ padding:"6px 12px", borderRadius:8, border:"none", cursor:"pointer", fontSize:12, fontWeight:600,
              background: state.expForm.category===c?"#f87171":"#2a2a2a", color: state.expForm.category===c?"#fff":"#aaa" },
            onclick: ()=>{ state.expForm.category=c; render(); } }, c)
        ))
      ),
      el("div", { style:{ marginBottom:12 } },
        el("span", { style:{ fontSize:11, color:"#888", display:"block", marginBottom:6 } }, "Descrição (opcional)"),
        el("input", { value: state.expForm.desc, placeholder:"Ex: Oficina XPTO",
          style:{ background:"#2a2a2a", color:"#fff", border:"1px solid #444", borderRadius:8, padding:"8px 12px", width:"100%", fontSize:14 },
          oninput: e=>{ state.expForm.desc = e.target.value; } })
      ),
      el("div", { style:{ marginBottom:20 } },
        el("span", { style:{ fontSize:11, color:"#888", display:"block", marginBottom:6 } }, "Valor (€)"),
        el("input", { type:"number", value: state.expForm.valor, placeholder:"0.00",
          style:{ background:"#2a2a2a", color:"#fff", border:"1px solid #444", borderRadius:8, padding:"8px 12px", width:"100%", fontSize:20, fontWeight:700 },
          oninput: e=>{ state.expForm.valor = e.target.value; } })
      ),
      el("div", { style:{ display:"flex", gap:10 } },
        el("button", { style:{ flex:1, padding:12, background:"#333", border:"none", borderRadius:10, color:"#aaa", fontWeight:700, cursor:"pointer" }, onclick:()=>setState({ expModal:false }) }, "Cancelar"),
        el("button", { style:{ flex:2, padding:12, background:"#f87171", border:"none", borderRadius:10, color:"#fff", fontWeight:700, cursor:"pointer", fontSize:15 }, onclick:submitExpense }, state.editExpIndex!==null?"Guardar":"Adicionar")
      )
    )
  );
}

// ── MAIN RENDER ──
function render() {
  const root = document.getElementById("app");
  root.innerHTML = "";

  if (!state.configured) { root.append(renderSetup()); return; }

  root.append(renderHeader());

  if (state.syncError) {
    root.append(el("div", { style:{ margin:"10px 16px 0", background:"#2e1a1a", border:"1px solid #f8717155", borderRadius:10, padding:"8px 12px", fontSize:11, color:"#f87171" } }, "⚠️ "+state.syncError));
  }

  if (state.loading) {
    root.append(el("div", { style:{ textAlign:"center", padding:60, color:"#888" } }, "A carregar dados da Google Sheet..."));
  } else {
    const content = el("div", { style:{ padding:16 } });
    if (state.tab===0) content.append(renderHoje());
    else if (state.tab===1) content.append(renderHistorico());
    else if (state.tab===2) content.append(renderRelatorio());
    else content.append(renderResumo());
    root.append(content);
  }

  root.append(renderBottomNav());
  const dm = renderDeleteModal(); if (dm) root.append(dm);
  const em = renderExpModal(); if (em) root.append(em);
}

render();
</script>
</body>
</html>
